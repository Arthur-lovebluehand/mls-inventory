<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慢樂仙坊 · 進銷存系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd5;--border2:#c8c2b8;--text:#1a1714;--text2:#6b6560;--text3:#9e9890;--accent:#5c7a5c;--accent-l:#edf3ed;--red:#c0392b;--red-l:#fdf0ef;--amber:#b8860b;--amber-l:#fef9e7;--blue:#2c5f8a;--blue-l:#eef4fb;--brown:#8b5e3c;--brown-l:#f7f0ea;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.main{margin-left:210px;flex:1;min-height:100vh}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo h1{font-size:15px;font-weight:700;color:var(--accent)}
.logo p{font-size:11px;color:var(--text3);margin-top:2px}
.nav-sec{padding:12px 16px 3px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.ph{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.pt{font-size:15px;font-weight:600}
.ps{font-size:11px;color:var(--text3);margin-top:1px}
.ha{display:flex;gap:8px;align-items:center}
.pc{padding:18px 22px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.ml{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.mv{font-size:22px;font-weight:700;line-height:1}
.ms{font-size:11px;color:var(--text3);margin-top:3px}
.mv-g{color:var(--accent)}.mv-r{color:var(--red)}.mv-b{color:var(--blue)}.mv-br{color:var(--brown)}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:18px}
.tb{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tt{font-size:13px;font-weight:600;flex:1}
.sb{position:relative}
.sb input{padding:6px 9px 6px 30px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--text);width:200px;outline:none}
.sb input:focus{border-color:var(--accent)}
.sb svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text3);pointer-events:none}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 13px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.pg{padding:11px 15px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pi{font-size:11px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg{background:var(--accent-l);color:var(--accent)}
.br{background:var(--red-l);color:var(--red)}
.ba{background:var(--amber-l);color:var(--amber)}
.bb{background:var(--blue-l);color:var(--blue)}
.bgr{background:var(--surface2);color:var(--text2)}
.bbr{background:var(--brown-l);color:var(--brown)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#4a6b4a}
.btn-r{background:var(--red);color:#fff;border-color:var(--red)}
.btn-r:hover{background:#a93226}
.btn-sm{padding:4px 9px;font-size:12px}
.btn svg{width:13px;height:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.md{background:var(--surface);border-radius:var(--rl);width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mh{padding:16px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:14px;font-weight:600}
.mb{padding:18px}
.mf{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.ff{grid-column:1/-1}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent)}
.fl textarea{resize:vertical;min-height:60px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:10px}
.sp{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:14px}
.al-s{background:var(--accent-l);color:var(--accent)}
.al-e{background:var(--red-l);color:var(--red)}
.al-w{background:var(--amber-l);color:var(--amber)}
.sk-ok{color:var(--accent);font-weight:600}
.sk-lw{color:var(--amber);font-weight:600}
.sk-ze{color:var(--red);font-weight:600}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.dr{display:flex;flex-direction:column;gap:2px}
.dlb{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase}
.dv{font-size:13px}
.itb{width:100%;border-collapse:collapse;margin-top:6px}
.itb th{font-size:10px;color:var(--text3);padding:5px 7px;text-align:left;background:var(--surface2)}
.itb td{padding:6px 7px;border-top:1px solid var(--border);font-size:13px}
.itb tr:hover td{background:var(--surface2)}
.rtag{position:fixed;bottom:18px;right:18px;background:var(--accent);color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.rtag.show{opacity:1}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:7px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.num{font-variant-numeric:tabular-nums}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:7px;padding:8px;background:var(--surface2);border-radius:var(--r)}
@media(max-width:768px){.sidebar{width:56px}.logo h1,.logo p,.nav-item span,.nav-sec{display:none}.main{margin-left:56px}.nav-item{justify-content:center;padding:11px}.fg{grid-template-columns:1fr}.pc{padding:14px}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><h1>慢樂仙坊</h1><p>進銷存管理系統</p></div>
  <div class="nav-sec">總覽</div>
  <div class="nav-item active" onclick="go('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>總覽</span></div>
  <div class="nav-sec">庫存</div>
  <div class="nav-item" onclick="go('products')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>商品庫存</span></div>
  <div class="nav-item" onclick="go('purchase')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><path d="M16 11v-2a2 2 0 0 0-2-2"/></svg><span>進貨管理</span></div>
  <div class="nav-sec">銷售</div>
  <div class="nav-item" onclick="go('orders')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg><span>銷售訂單</span></div>
  <div class="nav-item" onclick="go('loans')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg><span>借貨管理</span></div>
  <div class="nav-sec">客戶</div>
  <div class="nav-item" onclick="go('customers')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>客戶資料</span></div>
  <div class="nav-sec">財務</div>
  <div class="nav-item" onclick="go('accounts')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>對帳記錄</span></div>
  <div class="nav-sec">系統</div>
  <div class="nav-item" onclick="go('vendors')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg><span>廠商管理</span></div>
</aside>
<main class="main" id="main"><div class="loading"><div class="sp"></div>載入中…</div></main>
</div>

<!-- Modal -->
<div class="mo" id="modal">
  <div class="md">
    <div class="mh"><span class="mt" id="modal-title"></span><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="mb" id="modal-body"></div>
    <div class="mf" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="rtag" id="toast"></div>

<script>
const URL='https://tctqjjzokixjktiokvtt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjdHFqanpva2l4amt0aW9rdnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTQ0MjksImV4cCI6MjA5OTA3MDQyOX0.guft3uykLi7yUOakmlu9yOR3Or-3bk2gwC4Bd7zXnQ0';
const sb=supabase.createClient(URL,KEY);

// Realtime channel
let channel=null;
function setupRealtime(){
  if(channel) sb.removeChannel(channel);
  channel=sb.channel('mls-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>{ if(window._curPage) refresh(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>{ if(window._curPage) refresh(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'purchase_orders'},()=>{ if(window._curPage) refresh(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'sales_order_items'},()=>{ if(window._curPage) refresh(); })
    .subscribe();
}

let _curPage='dashboard';
function refresh(){ pages[_curPage]?.(); }
function go(p){
  _curPage=p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{if(el.getAttribute('onclick')===`go('${p}')`)el.classList.add('active');});
  document.getElementById('main').innerHTML='<div class="loading"><div class="sp"></div>載入中…</div>';
  pages[p]?.();
}

function toast(msg,type='s'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='rtag show'+(type==='e'?' al-e':type==='w'?' al-w':'');
  clearTimeout(window._toastT);
  window._toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

const fmt=n=>n==null?'—':Number(n).toLocaleString('zh-TW');
const fmtM=n=>n==null?'—':'$'+Number(n).toLocaleString('zh-TW');
const fmtD=s=>s?s.slice(0,10):'—';
function lv(l){const m={'總盤':'bbr','大區':'bbr','市代':'bb','經銷':'bg','VIP':'ba','零售':'bgr'};return`<span class="badge ${m[l]||'bgr'}">${l||'—'}</span>`;}
function sk(n){return n<=0?'sk-ze':n<=5?'sk-lw':'sk-ok';}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function openModal(title,body,footer=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  document.getElementById('modal').classList.add('open');
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ── DASHBOARD ──
async function dashboardPage(){
  const [{count:tp},{count:to},{count:tc},{data:ls},{data:oos},{data:rec},{data:mon}]=await Promise.all([
    sb.from('products').select('*',{count:'exact',head:true}).not('product_no','is',null),
    sb.from('sales_orders').select('*',{count:'exact',head:true}),
    sb.from('customers').select('*',{count:'exact',head:true}),
    sb.from('products').select('product_no,name,spec,stock').lte('stock',5).gt('stock',0).order('stock').limit(8),
    sb.from('products').select('product_no,name,spec').eq('stock',0).not('product_no','is',null).limit(8),
    sb.from('sales_orders').select('order_no,order_date,customer_name,total,status,payment_done').order('order_date',{ascending:false}).limit(6),
    sb.from('monthly_accounts').select('month,income,expense,total').order('month',{ascending:false}).limit(5),
  ]);
  document.getElementById('main').innerHTML=`
  <div class="ph"><div><div class="pt">總覽儀表板</div><div class="ps">慢樂仙坊進銷存系統 · 即時同步</div></div></div>
  <div class="pc">
    <div class="mg">
      <div class="mc"><div class="ml">商品種類</div><div class="mv mv-g">${tp}</div><div class="ms">項商品</div></div>
      <div class="mc"><div class="ml">銷售訂單</div><div class="mv mv-b">${to}</div><div class="ms">張歷史訂單</div></div>
      <div class="mc"><div class="ml">客戶數</div><div class="mv mv-br">${tc}</div><div class="ms">位客戶</div></div>
      <div class="mc"><div class="ml">需補貨</div><div class="mv mv-r">${(ls?.length||0)+(oos?.length||0)}</div><div class="ms">項低/零庫存</div></div>
    </div>
    ${oos?.length?`<div class="alert al-e" style="margin-bottom:12px"><strong>庫存歸零（${oos.length}項）：</strong>${oos.map(p=>`${p.name}${p.spec?` (${p.spec})`:''}`).join('、')}</div>`:''}
    ${ls?.length?`<div class="alert al-w" style="margin-bottom:12px"><strong>低庫存（${ls.length}項）：</strong>${ls.map(p=>`${p.name} <b>${p.stock}</b>件`).join('、')}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="tc"><div class="tb"><span class="tt">最近訂單</span><button class="btn btn-sm" onclick="go('orders')">查看全部</button></div>
      <div class="tw"><table><tr><th>訂單號</th><th>客戶</th><th>金額</th><th>收款</th></tr>
      ${(rec||[]).map(o=>`<tr style="cursor:pointer" onclick="showOrder('${o.order_no}')"><td style="font-size:11px;color:var(--text2)">${o.order_no}</td><td>${o.customer_name||'—'}</td><td class="num">${fmtM(o.total)}</td><td><span class="badge ${o.payment_done?'bg':'br'}">${o.payment_done?'已收':'未收'}</span></td></tr>`).join('')}
      </table></div></div>
      <div class="tc"><div class="tb"><span class="tt">月度收支</span><button class="btn btn-sm" onclick="go('accounts')">查看全部</button></div>
      <div class="tw"><table><tr><th>月份</th><th>收入</th><th>支出</th><th>結餘</th></tr>
      ${(mon||[]).map(m=>`<tr><td>${m.month}</td><td class="num sk-ok">${fmtM(m.income)}</td><td class="num sk-ze">${fmtM(m.expense)}</td><td class="num" style="font-weight:600">${fmtM(m.total)}</td></tr>`).join('')}
      </table></div></div>
    </div>
  </div>`;
}

// ── PRODUCTS ──
let pSearch='',pPage=1;
async function productsPage(){
  let q=sb.from('products').select('*',{count:'exact'}).not('product_no','is',null).order('product_no');
  if(pSearch) q=q.or(`name.ilike.%${pSearch}%,product_no.ilike.%${pSearch}%,category.ilike.%${pSearch}%`);
  const{data,count}=await q.range((pPage-1)*30,pPage*30-1);
  const tp=Math.ceil((count||0)/30);
  document.getElementById('main').innerHTML=`
  <div class="ph"><div><div class="pt">商品庫存</div><div class="ps">共 ${count||0} 項</div></div>
  <div class="ha"><button class="btn btn-p" onclick="addProduct()">＋ 新增商品</button></div></div>
  <div class="pc">
    <div class="tc">
      <div class="tb"><span class="tt">商品清單</span>
        <div class="sb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input placeholder="搜尋名稱/編號/類別…" value="${pSearch}" oninput="pSearch=this.value;pPage=1;productsPage()"></div>
      </div>
      <div class="tw"><table><tr><th>編號</th><th>商品名稱</th><th>規格</th><th>類別</th><th>庫存</th><th>零售</th><th>VIP</th><th>成本</th><th>操作</th></tr>
      ${(data||[]).map(p=>`<tr>
        <td style="font-size:11px;font-family:monospace;color:var(--text2)">${p.product_no}</td>
        <td style="font-weight:500">${p.name}</td>
        <td style="font-size:12px;color:var(--text2)">${p.spec||'—'}</td>
        <td>${p.category?`<span class="badge bgr">${p.category}</span>`:'—'}</td>
        <td class="num ${sk(p.stock)}">${fmt(p.stock)}</td>
        <td class="num">${p.price_retail?fmtM(p.price_retail):'—'}</td>
        <td class="num">${p.price_vip?fmtM(p.price_vip):'—'}</td>
        <td class="num">${p.cost?fmtM(p.cost):'—'}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-sm" onclick="editProduct(${JSON.stringify(p).split('"').join('&quot;')})">編輯</button>
          <button class="btn btn-sm" onclick="adjStock('${p.product_no}','${p.name}',${p.stock})">調庫存</button>
          <button class="btn btn-sm btn-r" onclick="delProduct('${p.product_no}','${p.name}')">刪除</button>
        </div></td>
      </tr>`).join('')}
      </table></div>

async function addOrder(){
  const{data:prods}=await sb.from('products').select('product_no,name,spec,stock,price_retail,price_vip,price_dealer').not('product_no','is',null).gt('stock',0).order('name');
  const{data:custs}=await sb.from('customers').select('customer_no,name,agent_level,phone,ship_full_address').order('name');
  const today=new Date().toISOString().slice(0,10);
  const newNo='SO-'+today.replace(/-/g,'')+'-'+String(Math.floor(Math.random()*900)+100);
  window._orderItems=[{id:1,product_no:'',qty:1,unit_price:'',amount:0}];

  function renderItems(){
    return window._orderItems.map((item,i)=>{
      const p=prods?.find(x=>x.product_no===item.product_no);
      return `<div class="item-row" id="irow${item.id}">
        <select onchange="setItemProd(${item.id},this.value)" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)">
          <option value="">選擇商品…</option>
          ${(prods||[]).map(p=>`<option value="${p.product_no}" ${p.product_no===item.product_no?'selected':''}>${p.name}${p.spec?` (${p.spec})`:''} 庫存:${p.stock}</option>`).join('')}
        </select>
        <input type="number" value="${item.qty}" min="1" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);width:100%" onchange="setItemQty(${item.id},this.value)">
        <input type="number" value="${item.unit_price}" placeholder="單價" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);width:100%" onchange="setItemPrice(${item.id},this.value)">
        <span style="font-size:13px;font-weight:500">${fmtM(item.amount)}</span>
        <button onclick="removeItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:16px">×</button>
      </div>`;
    }).join('');
  }

  openModal('新增銷售訂單',`
  <div class="fg" style="margin-bottom:14px">
    <div class="fl"><label>訂單編號</label><input id="ono" value="${newNo}"></div>
    <div class="fl"><label>訂單日期</label><input id="odate" type="date" value="${today}"></div>
    <div class="fl"><label>客戶</label><select id="ocust" onchange="fillCust(this.value)"><option value="">選擇客戶…</option>${(custs||[]).map(c=>`<option value="${c.customer_no}">${c.name} (${c.agent_level||'—'})</option>`).join('')}</select></div>
    <div class="fl"><label>客戶姓名（可直接填）</label><input id="oname" placeholder="或直接輸入客戶名稱"></div>
    <div class="fl"><label>手機</label><input id="ophone"></div>
    <div class="fl"><label>寄送方式</label><select id="oshipping"><option>郵寄</option><option>超商取貨</option><option>親送</option><option>自取</option></select></div>
    <div class="fl ff"><label>送貨地址</label><input id="oaddr"></div>
    <div class="fl"><label>付款方式</label><select id="opay"><option>付款交單 (D/P)</option><option>匯款</option><option>信用卡</option><option>現金</option></select></div>
    <div class="fl"><label>運費</label><input id="oshipping_fee" type="number" value="0"></div>
  </div>
  <div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--text3)">訂購項目</span>
    <button class="btn btn-sm" onclick="addItem()">＋ 加品項</button></div>
    <div id="itemsArea">${renderItems()}</div>
    <div id="orderTotal" style="text-align:right;font-weight:600;padding-top:8px;border-top:1px solid var(--border);margin-top:8px">${calcTotal()}</div>
  </div>
  <div class="fl"><label>備註</label><textarea id="onote" rows="2"></textarea></div>`,
  `<button class="btn" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="saveOrder()">建立訂單</button>`);

  window.setItemProd=(id,val)=>{
    const item=window._orderItems.find(x=>x.id===id);
    if(item){item.product_no=val;const p=prods?.find(x=>x.product_no===val);if(p)item.unit_price=p.price_retail||0;item.amount=(item.qty||1)*(item.unit_price||0);}
    document.getElementById('itemsArea').innerHTML=renderItems();document.getElementById('orderTotal').innerHTML=calcTotal();
  };
  window.setItemQty=(id,val)=>{const item=window._orderItems.find(x=>x.id===id);if(item){item.qty=Number(val)||1;item.amount=item.qty*(item.unit_price||0);}document.getElementById('itemsArea').innerHTML=renderItems();document.getElementById('orderTotal').innerHTML=calcTotal();};
  window.setItemPrice=(id,val)=>{const item=window._orderItems.find(x=>x.id===id);if(item){item.unit_price=Number(val)||0;item.amount=item.qty*item.unit_price;}document.getElementById('itemsArea').innerHTML=renderItems();document.getElementById('orderTotal').innerHTML=calcTotal();};
  window.addItem=()=>{const newId=Date.now();window._orderItems.push({id:newId,product_no:'',qty:1,unit_price:'',amount:0});document.getElementById('itemsArea').innerHTML=renderItems();};
  window.removeItem=(id)=>{window._orderItems=window._orderItems.filter(x=>x.id!==id);document.getElementById('itemsArea').innerHTML=renderItems();document.getElementById('orderTotal').innerHTML=calcTotal();};
  window.fillCust=(cno)=>{const c=custs?.find(x=>x.customer_no===cno);if(c){document.getElementById('oname').value=c.name||'';document.getElementById('ophone').value=c.phone||'';document.getElementById('oaddr').value=c.ship_full_address||'';}};
  window.calcTotal=()=>{const sub=window._orderItems.reduce((s,i)=>s+(i.amount||0),0);const ship=Number(document.getElementById('oshipping_fee')?.value||0);const tax=Math.round(sub*0.05);const total=sub+ship+tax;return `小計 ${fmtM(sub)} + 運費 ${fmtM(ship)} + 稅 ${fmtM(tax)} = <span style="color:var(--accent)">${fmtM(total)}</span>`;};
  function calcTotal(){const sub=window._orderItems.reduce((s,i)=>s+(i.amount||0),0);const ship=0;const tax=Math.round(sub*0.05);const total=sub+ship+tax;return `小計 ${fmtM(sub)} + 稅 ${fmtM(tax)} = <span style="color:var(--accent)">${fmtM(total)}</span>`;}
}

async function saveOrder(){
  const no=v('ono'),date=v('odate'),name=v('oname'),phone=v('ophone'),addr=v('oaddr'),pay=v('opay'),ship=v('oshipping'),sfee=num('oshipping_fee'),note=v('onote');
  const items=window._orderItems.filter(i=>i.product_no&&i.qty>0);
  if(!no||!name){toast('請填寫訂單號和客戶名稱','e');return;}
  if(!items.length){toast('請至少選一項商品','e');return;}
  const sub=items.reduce((s,i)=>s+(i.amount||0),0);
  const tax=Math.round(sub*0.05);
  const total=sub+(sfee||0)+tax;
  const{error:oe}=await sb.from('sales_orders').insert({order_no:no,order_date:date,customer_name:name,phone,ship_address:addr,payment_method:pay,shipping_method:ship,shipping_fee:sfee,note,subtotal:sub,tax,total,payment_done:false,products_summary:items.map(i=>{const p=window._orderProds?.find(x=>x.product_no===i.product_no);return p?.name||i.product_no;}).join('、')});
  if(oe){toast('建立失敗：'+oe.message,'e');return;}
  const iRows=items.map(i=>{const p=window._orderProds?.find(x=>x.product_no===i.product_no);return{order_no:no,product_no:i.product_no,product_name:p?.name||i.product_no,unit_price:i.unit_price,qty:i.qty,amount:i.amount,year_month:date.slice(0,7)};});
  if(iRows.length) await sb.from('sales_order_items').insert(iRows);
  // 扣庫存
  for(const i of items){
    const{data:p}=await sb.from('products').select('stock').eq('product_no',i.product_no).single();
    if(p) await sb.from('products').update({stock:Math.max(0,p.stock-i.qty)}).eq('product_no',i.product_no);
  }
  toast('訂單建立成功！庫存已自動扣除');closeModal();ordersPage();
}

async function addPO(){
  const{data:vendors}=await sb.from('vendors').select('vendor_no,name,contact').order('name');
  const{data:prods}=await sb.from('products').select('product_no,name,spec,cost').order('name');
  const today=new Date().toISOString().slice(0,10);
  const newNo='PO-'+today.replace(/-/g,'')+'-'+String(Math.floor(Math.random()*900)+100);
  window._poItems=[{id:1,product_no:'',qty:1,unit_price:'',amount:0}];
  window._poProds=prods;

  function renderPOItems(){
    return window._poItems.map((item,i)=>`<div class="item-row" id="pirow${item.id}">
      <select onchange="setPOProd(${item.id},this.value)" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)">
        <option value="">選擇商品…</option>
        ${(prods||[]).map(p=>`<option value="${p.product_no}" ${p.product_no===item.product_no?'selected':''}>${p.name}${p.spec?` (${p.spec})`:''}</option>`).join('')}
      </select>
      <input type="number" value="${item.qty}" min="1" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);width:100%" onchange="setPOQty(${item.id},this.value)">
      <input type="number" value="${item.unit_price}" placeholder="進貨價" style="font-size:13px;padding:5px;border:1px solid var(--border);border-radius:var(--r);width:100%" onchange="setPOPrice(${item.id},this.value)">
      <span style="font-size:13px;font-weight:500">${fmtM(item.amount)}</span>
      <button onclick="removePOItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:16px">×</button>
    </div>`).join('');
  }

  openModal('新增進貨單',`
  <div class="fg" style="margin-bottom:14px">
    <div class="fl"><label>進貨單號</label><input id="pono" value="${newNo}"></div>
    <div class="fl"><label>進貨日期</label><input id="podate" type="date" value="${today}"></div>
    <div class="fl"><label>廠商</label><select id="povend" onchange="fillVend(this.value)"><option value="">選擇廠商…</option>${(vendors||[]).map(v=>`<option value="${v.vendor_no}">${v.name}</option>`).join('')}</select></div>
    <div class="fl"><label>廠商名稱（可直接填）</label><input id="povendname" placeholder="或直接輸入廠商名稱"></div>
    <div class="fl"><label>付款方式</label><input id="popay" value="交貨付現"></div>
  </div>
  <div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--text3)">進貨項目</span><button class="btn btn-sm" onclick="addPOItem()">＋ 加品項</button></div>
    <div id="poItemsArea">${renderPOItems()}</div>
    <div id="poTotal" style="text-align:right;font-weight:600;padding-top:8px;border-top:1px solid var(--border);margin-top:8px">合計：${fmtM(0)}</div>
  </div>
  <div class="fl"><label>備註</label><textarea id="ponote" rows="2"></textarea></div>`,
  `<button class="btn" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="savePO()">建立進貨單</button>`);

  window.setPOProd=(id,val)=>{const item=window._poItems.find(x=>x.id===id);if(item){item.product_no=val;const p=prods?.find(x=>x.product_no===val);if(p)item.unit_price=p.cost||0;item.amount=(item.qty||1)*(item.unit_price||0);}document.getElementById('poItemsArea').innerHTML=renderPOItems();updPOTotal();};
  window.setPOQty=(id,val)=>{const item=window._poItems.find(x=>x.id===id);if(item){item.qty=Number(val)||1;item.amount=item.qty*(item.unit_price||0);}document.getElementById('poItemsArea').innerHTML=renderPOItems();updPOTotal();};
  window.setPOPrice=(id,val)=>{const item=window._poItems.find(x=>x.id===id);if(item){item.unit_price=Number(val)||0;item.amount=item.qty*item.unit_price;}document.getElementById('poItemsArea').innerHTML=renderPOItems();updPOTotal();};
  window.addPOItem=()=>{const newId=Date.now();window._poItems.push({id:newId,product_no:'',qty:1,unit_price:'',amount:0});document.getElementById('poItemsArea').innerHTML=renderPOItems();};
  window.removePOItem=(id)=>{window._poItems=window._poItems.filter(x=>x.id!==id);document.getElementById('poItemsArea').innerHTML=renderPOItems();updPOTotal();};
  window.updPOTotal=()=>{const sub=window._poItems.reduce((s,i)=>s+(i.amount||0),0);document.getElementById('poTotal').innerHTML=`合計：<span style="color:var(--brown)">${fmtM(sub)}</span>`;};
  window.fillVend=(vno)=>{const v=vendors?.find(x=>x.vendor_no===vno);if(v)document.getElementById('povendname').value=v.name||'';};
}

async function savePO(){
  const no=v('pono'),date=v('podate'),vname=v('povendname'),pay=v('popay'),note=v('ponote');
  const items=window._poItems.filter(i=>i.product_no&&i.qty>0);
  if(!no||!vname){toast('請填寫進貨單號和廠商名稱','e');return;}
  const sub=items.reduce((s,i)=>s+(i.amount||0),0);
  const tax=Math.round(sub*0.05);
  const total=sub+tax;
  await sb.from('purchase_orders').insert({po_no:no,po_date:date,vendor_name:vname,payment_method:pay,note,subtotal:sub,tax,total,done:false,products_summary:items.map(i=>{const p=window._poProds?.find(x=>x.product_no===i.product_no);return p?.name||i.product_no;}).join('、')});
  if(items.length){
    const iRows=items.map(i=>{const p=window._poProds?.find(x=>x.product_no===i.product_no);return{po_no:no,product_no:i.product_no,product_name:p?.name||i.product_no,spec:p?.spec,unit_price:i.unit_price,qty:i.qty,amount:i.amount,po_date:date};});
    await sb.from('purchase_order_items').insert(iRows);
    // 增加庫存
    for(const i of items){
      const{data:p}=await sb.from('products').select('stock').eq('product_no',i.product_no).single();
      if(p) await sb.from('products').update({stock:p.stock+i.qty}).eq('product_no',i.product_no);
    }
  }
  toast('進貨單建立成功！庫存已自動增加');closeModal();purchasePage();
}

  ${(pos||[]).map(p=>`<tr><td style="font-size:11px">${p.po_no}</td><td>${fmtD(p.po_date)}</td><td class="num">${fmtM(p.total)}</td><td><span class="badge ${p.done?'bg':'ba'}">${p.done?'完成':'進行中'}</span></td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--text3)">無紀錄</td></tr>'}
  </table>`,
  `<button class="btn" onclick="closeModal()">關閉</button>`);
}

// helpers
function v(id){return document.getElementById(id)?.value||'';}
function num(id){const n=parseFloat(v(id));return isNaN(n)?null:n;}

const pages={dashboard:dashboardPage,products:productsPage,orders:ordersPage,purchase:purchasePage,customers:customersPage,loans:loansPage,accounts:accountsPage,vendors:vendorsPage};

// init
setupRealtime();
go('dashboard');
</script>
