<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慢樂仙坊 · 進銷存系統</title>
<style>
:root{--bg:#f7f5f0;--sf:#fff;--sf2:#f0ede6;--bd:#e2ddd5;--tx:#1a1714;--tx2:#6b6560;--tx3:#9e9890;--ac:#5c7a5c;--ac-l:#edf3ed;--rd:#c0392b;--rd-l:#fdf0ef;--am:#b8860b;--am-l:#fef9e7;--bl:#2c5f8a;--bl-l:#eef4fb;--br:#8b5e3c;--br-l:#f7f0ea;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
.app{display:flex;min-height:100vh}
.sb{width:210px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.main{margin-left:210px;flex:1;min-height:100vh}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.logo h1{font-size:15px;font-weight:700;color:var(--ac)}
.logo p{font-size:11px;color:var(--tx3);margin-top:2px}
.ns{padding:10px 16px 3px;font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:var(--tx2);font-size:13px;border-left:3px solid transparent;transition:background .1s}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.on{background:var(--ac-l);color:var(--ac);border-left-color:var(--ac);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.ni.on svg{opacity:1}
.ph{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.pt{font-size:15px;font-weight:600}
.ps{font-size:11px;color:var(--tx3);margin-top:1px}
.ha{display:flex;gap:8px}
.pc{padding:18px 22px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:14px}
.ml{font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.mv{font-size:22px;font-weight:700}.ms{font-size:11px;color:var(--tx3);margin-top:3px}
.g{color:var(--ac)}.r{color:var(--rd)}.b{color:var(--bl)}.br{color:var(--br)}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:18px}
.tb{padding:11px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tt{font-size:13px;font-weight:600;flex:1}
.si{position:relative}
.si input{padding:6px 9px 6px 28px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--tx);width:190px;outline:none}
.si input:focus{border-color:var(--ac)}
.si svg{position:absolute;left:7px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--tx3);pointer-events:none}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf2)}
.pg{padding:10px 15px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.pi{font-size:11px;color:var(--tx3)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg{background:var(--ac-l);color:var(--ac)}.br2{background:var(--rd-l);color:var(--rd)}.ba{background:var(--am-l);color:var(--am)}.bb{background:var(--bl-l);color:var(--bl)}.bgr{background:var(--sf2);color:var(--tx2)}.bbr{background:var(--br-l);color:var(--br)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:var(--tx);white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--sf2)}
.btn-p{background:var(--ac);color:#fff;border-color:var(--ac)}.btn-p:hover{background:#4a6b4a}
.btn-r{background:var(--rd);color:#fff;border-color:var(--rd)}.btn-r:hover{background:#a93226}
.btn-s{padding:4px 9px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.mo.open{display:flex}
.md{background:var(--sf);border-radius:var(--rl);width:100%;max-width:600px;box-shadow:0 8px 32px rgba(0,0,0,.15);margin:auto}
.mh{padding:15px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:14px;font-weight:600}
.mb{padding:18px}
.mf{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fw{grid-column:1/-1}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.fl input:focus,.fl select:focus{border-color:var(--ac)}
.fl textarea{resize:vertical;min-height:55px}
.ld{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--tx3);gap:10px}
.sp{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.al{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:14px}
.al-s{background:var(--ac-l);color:var(--ac)}.al-e{background:var(--rd-l);color:var(--rd)}.al-w{background:var(--am-l);color:var(--am)}
.ok{color:var(--ac);font-weight:600}.lw{color:var(--am);font-weight:600}.ze{color:var(--rd);font-weight:600}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.dr{display:flex;flex-direction:column;gap:2px}
.dlb{font-size:10px;color:var(--tx3);font-weight:500;text-transform:uppercase}
.dv{font-size:13px}
.itb{width:100%;border-collapse:collapse;margin-top:6px}
.itb th{font-size:10px;color:var(--tx3);padding:5px 7px;text-align:left;background:var(--sf2)}
.itb td{padding:6px 7px;border-top:1px solid var(--bd);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:9px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
.ir{display:grid;grid-template-columns:2fr 80px 100px 90px 30px;gap:7px;align-items:center;background:var(--sf2);border-radius:var(--r);padding:8px;margin-bottom:6px}
.ir select,.ir input{font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);color:var(--tx);width:100%;outline:none}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--bd);margin-bottom:14px}
.tab{padding:7px 14px;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
.num{font-variant-numeric:tabular-nums}
@media(max-width:700px){.sb{width:54px}.logo h1,.logo p,.ni span,.ns{display:none}.main{margin-left:54px}.ni{justify-content:center;padding:10px}.fg{grid-template-columns:1fr}.pc{padding:12px}}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
  <div class="logo"><h1>慢樂仙坊</h1><p>進銷存管理系統</p></div>
  <div class="ns">總覽</div>
  <div class="ni on" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>總覽</span></div>
  <div class="ns">庫存</div>
  <div class="ni" data-page="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>商品庫存</span></div>
  <div class="ni" data-page="purchase"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>進貨管理</span></div>
  <div class="ns">銷售</div>
  <div class="ni" data-page="orders"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg><span>銷售訂單</span></div>
  <div class="ni" data-page="loans"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg><span>借貨管理</span></div>
  <div class="ns">客戶</div>
  <div class="ni" data-page="customers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>客戶資料</span></div>
  <div class="ns">財務</div>
  <div class="ni" data-page="accounts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>對帳記錄</span></div>
  <div class="ns">系統</div>
  <div class="ni" data-page="vendors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg><span>廠商管理</span></div>
</aside>
<main class="main" id="main"><div class="ld"><div class="sp"></div>載入中…</div></main>
</div>
<div class="mo" id="modal">
  <div class="md">
    <div class="mh"><span class="mt" id="mtitle">詳細資料</span><button class="btn btn-s" onclick="CM()">✕</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SURL='https://tctqjjzokixjktiokvtt.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjdHFqanpva2l4amt0aW9rdnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTQ0MjksImV4cCI6MjA5OTA3MDQyOX0.guft3uykLi7yUOakmlu9yOR3Or-3bk2gwC4Bd7zXnQ0';

// Load Supabase
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
script.onload = function() { init(); };
script.onerror = function() { document.getElementById('main').innerHTML='<div class="ld" style="flex-direction:column;gap:12px"><p style="color:var(--rd)">Supabase 載入失敗</p><p style="font-size:12px;color:var(--tx3)">請確認網路連線後重新整理</p></div>'; };
document.head.appendChild(script);

let sb;
function init() {
  try {
    sb = supabase.createClient(SURL, SKEY);
    // Nav
    document.querySelectorAll('.ni').forEach(el=>{
      el.addEventListener('click',()=>go(el.dataset.page));
    });
    document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) CM(); });
    // Setup realtime safely
    try {
      sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>{ if(window.CP) window.CP(); })
        .on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>{ if(window.CP) window.CP(); })
        .on('postgres_changes',{event:'*',schema:'public',table:'purchase_orders'},()=>{ if(window.CP) window.CP(); })
        .subscribe();
    } catch(e) { console.log('Realtime not available'); }
    go('dashboard');
  } catch(e) {
    document.getElementById('main').innerHTML='<div class="ld" style="color:var(--rd)">初始化錯誤：'+e.message+'</div>';
  }
}

let CP = null;
function go(p) {
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on', el.dataset.page===p));
  document.getElementById('main').innerHTML='<div class="ld"><div class="sp"></div>載入中…</div>';
  window.CP = pages[p];
  pages[p]?.();
}

function CM() { document.getElementById('modal').classList.remove('open'); }
function OM(title, body, foot) {
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mfoot').innerHTML=foot||'<button class="btn" onclick="CM()">關閉</button>';
  document.getElementById('modal').classList.add('open');
}

let _tid;
function toast(msg, type) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='e'?'var(--rd)':type==='w'?'var(--am)':'#2d6a2d';
  t.classList.add('on');
  clearTimeout(_tid);
  _tid=setTimeout(()=>t.classList.remove('on'),2800);
}

const $ = id => document.getElementById(id);
const v = id => $(`fi-${id}`)?.value?.trim()||'';
const n = id => { const x=parseFloat($(`fi-${id}`)?.value); return isNaN(x)?null:x; };
const fmtM = x => x==null?'—':'$'+Number(x).toLocaleString('zh-TW');
const fmtN = x => x==null?'—':Number(x).toLocaleString('zh-TW');
const fmtD = x => x?x.slice(0,10):'—';
function lv(l){ const m={'總盤':'bbr','大區':'bbr','市代':'bb','經銷':'bg','VIP':'ba','零售':'bgr'}; return `<span class="badge ${m[l]||'bgr'}">${l||'—'}</span>`; }
function sk(n){ return n<=0?'ze':n<=5?'lw':'ok'; }

// ─────────────── DASHBOARD ───────────────
async function dashboard() {
  try {
    const [r1,r2,r3,r4,r5,r6,r7] = await Promise.all([
      sb.from('products').select('*',{count:'exact',head:true}).not('product_no','is',null),
      sb.from('sales_orders').select('*',{count:'exact',head:true}),
      sb.from('customers').select('*',{count:'exact',head:true}),
      sb.from('products').select('name,spec,stock').lte('stock',5).gt('stock',0).order('stock').limit(8),
      sb.from('products').select('name,spec').eq('stock',0).not('product_no','is',null).limit(8),
      sb.from('sales_orders').select('order_no,order_date,customer_name,total,payment_done').order('order_date',{ascending:false}).limit(6),
      sb.from('monthly_accounts').select('month,income,expense,total').order('month',{ascending:false}).limit(5),
    ]);
    const oos=r5.data||[], ls=r4.data||[], rec=r6.data||[], mon=r7.data||[];
    $('main').innerHTML=`
    <div class="ph"><div><div class="pt">總覽儀表板</div><div class="ps">即時同步中</div></div></div>
    <div class="pc">
      <div class="mg">
        <div class="mc"><div class="ml">商品種類</div><div class="mv g">${r1.count||0}</div><div class="ms">項</div></div>
        <div class="mc"><div class="ml">歷史訂單</div><div class="mv b">${r2.count||0}</div><div class="ms">張</div></div>
        <div class="mc"><div class="ml">客戶數</div><div class="mv br">${r3.count||0}</div><div class="ms">位</div></div>
        <div class="mc"><div class="ml">需補貨</div><div class="mv r">${oos.length+ls.length}</div><div class="ms">項</div></div>
      </div>
      ${oos.length?`<div class="al al-e"><b>庫存歸零（${oos.length}）：</b>${oos.map(p=>p.name+(p.spec?` (${p.spec})`:'')).join('、')}</div>`:''}
      ${ls.length?`<div class="al al-w"><b>低庫存（${ls.length}）：</b>${ls.map(p=>p.name+' <b>'+p.stock+'</b>件').join('、')}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="tc"><div class="tb"><span class="tt">最近訂單</span><button class="btn btn-s" onclick="go('orders')">全部</button></div>
          <div class="tw"><table><tr><th>訂單號</th><th>客戶</th><th>金額</th><th>收款</th></tr>
          ${rec.map(o=>`<tr style="cursor:pointer" onclick="showOrder('${o.order_no}')"><td style="font-size:11px;color:var(--tx2)">${o.order_no}</td><td>${o.customer_name||'—'}</td><td class="num">${fmtM(o.total)}</td><td><span class="badge ${o.payment_done?'bg':'br2'}">${o.payment_done?'已收':'未收'}</span></td></tr>`).join('')}
          </table></div></div>
        <div class="tc"><div class="tb"><span class="tt">月度收支</span><button class="btn btn-s" onclick="go('accounts')">全部</button></div>
          <div class="tw"><table><tr><th>月份</th><th>收入</th><th>支出</th><th>結餘</th></tr>
          ${mon.map(m=>`<tr><td>${m.month}</td><td class="num ok">${fmtM(m.income)}</td><td class="num r">${fmtM(m.expense)}</td><td class="num" style="font-weight:600">${fmtM(m.total)}</td></tr>`).join('')}
          </table></div></div>
      </div>
    </div>`;
  } catch(e) { $('main').innerHTML=`<div class="ld" style="color:var(--rd)">載入失敗：${e.message}</div>`; }
}

// ─────────────── PRODUCTS ───────────────
let pS='',pP=1;
async function products() {
  try {
    let q=sb.from('products').select('product_no,name,spec,category,stock,price_retail,price_vip,cost',{count:'exact'}).not('product_no','is',null).order('product_no');
    if(pS) q=q.or(`name.ilike.%${pS}%,product_no.ilike.%${pS}%,category.ilike.%${pS}%`);
    const{data,count}=await q.range((pP-1)*30,pP*30-1);
    const tp=Math.ceil((count||0)/30);
    $('main').innerHTML=`
    <div class="ph"><div><div class="pt">商品庫存</div><div class="ps">${count||0} 項</div></div>
      <div class="ha"><button class="btn btn-p btn-s" onclick="addProd()">＋ 新增商品</button></div></div>
    <div class="pc">
      <div class="tc">
        <div class="tb"><span class="tt">商品清單</span>
          <div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input placeholder="名稱/編號/類別…" value="${pS}" oninput="pS=this.value;pP=1;products()"></div>
        </div>
        <div class="tw"><table>
          <tr><th>編號</th><th>商品名稱</th><th>規格</th><th>類別</th><th>庫存</th><th>零售</th><th>VIP</th><th>成本</th><th>操作</th></tr>
          ${(data||[]).map(p=>`<tr>
            <td style="font-size:11px;font-family:monospace;color:var(--tx2)">${p.product_no}</td>
            <td style="font-weight:500">${p.name}</td>
            <td style="font-size:12px;color:var(--tx2)">${p.spec||'—'}</td>
            <td>${p.category?`<span class="badge bgr">${p.category}</span>`:'—'}</td>
            <td class="num ${sk(p.stock)}">${fmtN(p.stock)}</td>
            <td class="num">${fmtM(p.price_retail)}</td>
            <td class="num">${fmtM(p.price_vip)}</td>
            <td class="num">${fmtM(p.cost)}</td>
            <td><div style="display:flex;gap:4px">
              <button class="btn btn-s" onclick='editProd(${JSON.stringify(p)})'>編輯</button>
              <button class="btn btn-s" onclick="adjStk('${p.product_no}','${p.name.replace(/'/g,"\\'")}',${p.stock})">調庫存</button>

async function doAdj(no,cur){

  toast(`庫存已調整為 ${ns}`);CM();products();

// 新增訂單
let _items=[], _prods=[], _custs=[];
async function addOrder(){
  const[{data:pr},{data:cu}]=await Promise.all([
    sb.from('products').select('product_no,name,spec,stock,price_retail,price_vip').not('product_no','is',null).gt('stock',0).order('name'),
    sb.from('customers').select('customer_no,name,agent_level,phone,ship_full_address').order('name'),
  ]);
  _prods=pr||[]; _custs=cu||[];
  _items=[{id:1,pno:'',qty:1,price:0,amt:0}];
  const today=new Date().toISOString().slice(0,10);
  const no='SO-'+today.replace(/-/g,'')+'-'+String(Date.now()).slice(-3);
  OM('新增銷售訂單',orderForm(no,today));
  renderItems();
}

function orderForm(no,today){
  const custOpts=_custs.map(c=>`<option value="${c.customer_no}">${c.name} (${c.agent_level||'—'})</option>`).join('');
  return `<div class="fg" style="margin-bottom:14px">
    ${fi('ono','訂單編號','text',no)} ${fi('odate','日期','date',today)}
    <div class="fl"><label>選擇客戶</label><select id="fi-ocust" onchange="fillCust(this.value)"><option value="">選擇客戶…</option>${custOpts}</select></div>
    ${fi('oname','客戶名稱 *')} ${fi('ophone','手機')}
    ${fs('oshp','寄送方式',['郵寄','超商取貨','親送','自取'])}
    ${fi('oaddr','送貨地址','text','')}
    ${fs('opay','付款方式',['付款交單 (D/P)','匯款','信用卡','現金'])}
    ${fi('ofee','運費','number','0')}
  </div>
  <div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-size:12px;font-weight:600;color:var(--tx3)">訂購項目</span>
      <button class="btn btn-s" onclick="addItem()">＋ 加品項</button>
    </div>
    <div id="itemsArea"></div>
    <div id="orderAmt" style="text-align:right;font-weight:600;padding-top:8px;border-top:1px solid var(--bd);margin-top:8px;font-size:13px"></div>
  </div>
  <div class="fl"><label>備註</label><textarea id="fi-onote" rows="2"></textarea></div>`;
}

function prodOpts(sel){
  return _prods.map(p=>`<option value="${p.product_no}" ${p.product_no===sel?'selected':''}>${p.name}${p.spec?` (${p.spec})`:''} [庫存${p.stock}]</option>`).join('');
}

function renderItems(){
  const area=$('itemsArea'); if(!area)return;
  area.innerHTML=_items.map(item=>`
  <div class="ir">
    <select onchange="setIP(${item.id},this.value)"><option value="">選擇商品…</option>${prodOpts(item.pno)}</select>
    <input type="number" value="${item.qty}" min="1" onchange="setIQ(${item.id},this.value)" placeholder="數量">
    <input type="number" value="${item.price||''}" onchange="setIV(${item.id},this.value)" placeholder="單價">
    <span style="font-size:13px;font-weight:500">${fmtM(item.amt)}</span>
    <button onclick="rmItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:18px;line-height:1">×</button>
  </div>`).join('');
  updAmt();
}

window.addItem=()=>{_items.push({id:Date.now(),pno:'',qty:1,price:0,amt:0});renderItems();};
window.rmItem=id=>{_items=_items.filter(x=>x.id!==id);renderItems();};
window.setIP=(id,val)=>{const it=_items.find(x=>x.id===id);if(it){it.pno=val;const p=_prods.find(x=>x.product_no===val);if(p)it.price=p.price_retail||0;it.amt=it.qty*it.price;}renderItems();};
window.setIQ=(id,val)=>{const it=_items.find(x=>x.id===id);if(it){it.qty=Math.max(1,+val||1);it.amt=it.qty*it.price;}renderItems();};
window.setIV=(id,val)=>{const it=_items.find(x=>x.id===id);if(it){it.price=+val||0;it.amt=it.qty*it.price;}renderItems();};
window.fillCust=cno=>{const c=_custs.find(x=>x.customer_no===cno);if(c){$('fi-oname').value=c.name||'';$('fi-ophone').value=c.phone||'';$('fi-oaddr').value=c.ship_full_address||'';}};

function updAmt(){
  const el=$('orderAmt');if(!el)return;
  const sub=_items.reduce((s,i)=>s+i.amt,0);
  const fee=parseFloat($('fi-ofee')?.value)||0;
  const tax=Math.round(sub*0.05);
  el.innerHTML=`小計 ${fmtM(sub)} + 運費 ${fmtM(fee)} + 稅 ${fmtM(tax)} = <span style="color:var(--ac)">${fmtM(sub+fee+tax)}</span>`;
}

async function saveOrder(){
  const no=v('ono'),nm=v('oname'),dt=v('odate');
  if(!no||!nm){toast('請填寫訂單號和客戶名稱','e');return;}
  const its=_items.filter(i=>i.pno&&i.qty>0);
  if(!its.length){toast('請至少選一項商品','e');return;}
  const sub=its.reduce((s,i)=>s+i.amt,0),fee=n('ofee')||0,tax=Math.round(sub*0.05),total=sub+fee+tax;
  const{error}=await sb.from('sales_orders').insert({
    order_no:no,order_date:dt,customer_name:nm,phone:v('ophone'),ship_address:v('oaddr'),
    payment_method:v('opay'),shipping_method:v('oshp'),shipping_fee:fee,note:v('onote'),
    subtotal:sub,tax,total,payment_done:false,
    products_summary:its.map(i=>(_prods.find(p=>p.product_no===i.pno)?.name||i.pno)).join('、')
  });
  if(error){toast('建立失敗：'+error.message,'e');return;}
  const rows=its.map(i=>{const p=_prods.find(x=>x.product_no===i.pno);return{order_no:no,product_no:i.pno,product_name:p?.name||i.pno,unit_price:i.price,qty:i.qty,amount:i.amt,year_month:dt.slice(0,7)};});
  await sb.from('sales_order_items').insert(rows);
  for(const i of its){
    const{data:p}=await sb.from('products').select('stock').eq('product_no',i.pno).single();
    if(p) await sb.from('products').update({stock:Math.max(0,p.stock-i.qty)}).eq('product_no',i.pno);
  }
  toast('訂單建立成功！庫存已自動扣除');CM();orders();
}

let _poItems=[], _poProds=[], _vends=[];
async function addPO(){
  const[{data:pr},{data:vn}]=await Promise.all([
    sb.from('products').select('product_no,name,spec,cost').order('name'),
    sb.from('vendors').select('vendor_no,name').order('name'),
  ]);
  _poProds=pr||[]; _vends=vn||[];
  _poItems=[{id:1,pno:'',qty:1,price:0,amt:0}];
  const today=new Date().toISOString().slice(0,10);
  const no='PO-'+today.replace(/-/g,'')+'-'+String(Date.now()).slice(-3);
  const vendOpts=_vends.map(v=>`<option value="${v.vendor_no}">${v.name}</option>`).join('');
  OM('新增進貨單',`<div class="fg" style="margin-bottom:14px">
    ${fi('pono','進貨單號','text',no)} ${fi('podt','日期','date',today)}
    <div class="fl"><label>選擇廠商</label><select id="fi-povend" onchange="fillVend(this.value)"><option value="">選擇廠商…</option>${vendOpts}</select></div>
    ${fi('povname','廠商名稱 *')} ${fi('popay','付款方式','text','交貨付現')}
  </div>
  <div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-size:12px;font-weight:600;color:var(--tx3)">進貨品項</span>
      <button class="btn btn-s" onclick="addPOItem()">＋ 加品項</button>
    </div>
    <div id="poArea"></div>
    <div id="poAmt" style="text-align:right;font-weight:600;padding-top:8px;border-top:1px solid var(--bd);margin-top:8px;font-size:13px"></div>
  </div>
  <div class="fl"><label>備註</label><textarea id="fi-ponote" rows="2"></textarea></div>`,
  `<button class="btn" onclick="CM()">取消</button><button class="btn btn-p" onclick="savePO()">建立進貨單</button>`);
  renderPOItems();
}

function poProdOpts(sel){
  return _poProds.map(p=>`<option value="${p.product_no}" ${p.product_no===sel?'selected':''}>${p.name}${p.spec?` (${p.spec})`:''}</option>`).join('');
}
function renderPOItems(){
  const area=$('poArea');if(!area)return;
  area.innerHTML=_poItems.map(item=>`
  <div class="ir">
    <select onchange="setPOIP(${item.id},this.value)"><option value="">選擇商品…</option>${poProdOpts(item.pno)}</select>
    <input type="number" value="${item.qty}" min="1" onchange="setPOIQ(${item.id},this.value)" placeholder="數量">
    <input type="number" value="${item.price||''}" onchange="setPOIV(${item.id},this.value)" placeholder="進貨價">
    <span style="font-size:13px;font-weight:500">${fmtM(item.amt)}</span>
    <button onclick="rmPOItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:18px;line-height:1">×</button>
  </div>`).join('');
  updPOAmt();
}
window.addPOItem=()=>{_poItems.push({id:Date.now(),pno:'',qty:1,price:0,amt:0});renderPOItems();};
window.rmPOItem=id=>{_poItems=_poItems.filter(x=>x.id!==id);renderPOItems();};
window.setPOIP=(id,val)=>{const it=_poItems.find(x=>x.id===id);if(it){it.pno=val;const p=_poProds.find(x=>x.product_no===val);if(p)it.price=p.cost||0;it.amt=it.qty*it.price;}renderPOItems();};
window.setPOIQ=(id,val)=>{const it=_poItems.find(x=>x.id===id);if(it){it.qty=Math.max(1,+val||1);it.amt=it.qty*it.price;}renderPOItems();};
window.setPOIV=(id,val)=>{const it=_poItems.find(x=>x.id===id);if(it){it.price=+val||0;it.amt=it.qty*it.price;}renderPOItems();};
window.fillVend=vno=>{const v=_vends.find(x=>x.vendor_no===vno);if(v)$('fi-povname').value=v.name||'';};
function updPOAmt(){const el=$('poAmt');if(!el)return;const sub=_poItems.reduce((s,i)=>s+i.amt,0);el.innerHTML=`合計：<span style="color:var(--br)">${fmtM(sub)}</span>`;}

async function savePO(){
  const no=v('pono'),vn=v('povname'),dt=v('podt');
  if(!no||!vn){toast('請填寫進貨單號和廠商名稱','e');return;}
  const its=_poItems.filter(i=>i.pno&&i.qty>0);
  const sub=its.reduce((s,i)=>s+i.amt,0),tax=Math.round(sub*0.05),total=sub+tax;
  await sb.from('purchase_orders').insert({po_no:no,po_date:dt,vendor_name:vn,payment_method:v('popay'),note:v('ponote'),subtotal:sub,tax,total,done:false,products_summary:its.map(i=>(_poProds.find(p=>p.product_no===i.pno)?.name||i.pno)).join('、')});
  if(its.length){
    await sb.from('purchase_order_items').insert(its.map(i=>{const p=_poProds.find(x=>x.product_no===i.pno);return{po_no:no,product_no:i.pno,product_name:p?.name||i.pno,spec:p?.spec,unit_price:i.price,qty:i.qty,amount:i.amt,po_date:dt};}));
    for(const i of its){
      const{data:p}=await sb.from('products').select('stock').eq('product_no',i.pno).single();
      if(p) await sb.from('products').update({stock:p.stock+i.qty}).eq('product_no',i.pno);
    }
  }
  toast('進貨單建立成功！庫存已自動增加');CM();purchase();
}
