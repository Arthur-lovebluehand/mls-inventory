<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>慢樂仙坊・進銷存系統</title>
<style>
:root{--bg:#f7f5f0;--sf:#fff;--sf2:#f0ede6;--bd:#e2ddd5;--tx:#1a1714;--tx2:#6b6560;--tx3:#9e9890;--ac:#5c7a5c;--acl:#edf3ed;--rd:#c0392b;--rdl:#fdf0ef;--am:#b8860b;--aml:#fef9e7;--bl:#2c5f8a;--bll:#eef4fb;--br:#8b5e3c;--brl:#f7f0ea;--r:7px;--rl:11px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
.app{display:flex;min-height:100vh}
.sdb{width:210px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.main{margin-left:210px;min-height:100vh}
.logo{padding:16px;border-bottom:1px solid var(--bd)}
.logo h1{font-size:15px;font-weight:700;color:var(--ac)}
.logo p{font-size:11px;color:var(--tx3);margin-top:2px}
.ns{padding:10px 16px 3px;font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:var(--tx2);font-size:13px;border-left:3px solid transparent}
.ni:hover{background:var(--sf2)}
.ni.on{background:var(--acl);color:var(--ac);border-left-color:var(--ac);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}.ni.on svg{opacity:1}
/* page */
.ph{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.pt{font-size:15px;font-weight:600}.ps{font-size:11px;color:var(--tx3);margin-top:1px}
.ha{display:flex;gap:7px}
.pc{padding:18px 22px}
/* metrics */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px}
.ml{font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.mv{font-size:22px;font-weight:700}.ms{font-size:11px;color:var(--tx3);margin-top:2px}
.cg{color:var(--ac)}.cr{color:var(--rd)}.cb{color:var(--bl)}.cbr{color:var(--br)}
/* table */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.tb{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tt{font-size:13px;font-weight:600;flex:1}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf2)}
.pg{padding:10px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.pi{font-size:11px;color:var(--tx3)}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg{background:var(--acl);color:var(--ac)}.br2{background:var(--rdl);color:var(--rd)}.ba{background:var(--aml);color:var(--am)}.bb{background:var(--bll);color:var(--bl)}.bgr{background:var(--sf2);color:var(--tx2)}.bbr{background:var(--brl);color:var(--br)}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:var(--tx);white-space:nowrap}
.btn:hover{background:var(--sf2)}.btn-p{background:var(--ac);color:#fff;border-color:var(--ac)}.btn-p:hover{background:#4a6b4a}
.btn-r{background:var(--rd);color:#fff;border-color:var(--rd)}.btn-s{padding:4px 8px;font-size:12px}
/* modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto}
.mo.open{display:flex}
.md{background:var(--sf);border-radius:var(--rl);width:100%;max-width:680px;box-shadow:0 8px 32px rgba(0,0,0,.15);margin:auto}
.md-lg{max-width:860px}
.mh{padding:14px 17px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:14px;font-weight:600}.mb{padding:17px}.mf{padding:12px 17px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end}
/* form */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fw{grid-column:1/-1}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--ac)}
.fl textarea{resize:vertical;min-height:55px}
/* searchable select */
.ss-wrap{position:relative}
.ss-input{width:100%;padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.ss-input:focus{border-color:var(--ac)}
.ss-drop{position:absolute;top:100%;left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);max-height:200px;overflow-y:auto;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ss-drop.open{display:block}
.ss-opt{padding:7px 10px;font-size:13px;cursor:pointer}
.ss-opt:hover,.ss-opt.sel{background:var(--acl);color:var(--ac)}
.ss-opt.no{color:var(--tx3);cursor:default}
/* item row in forms */
.ir{display:grid;gap:6px;align-items:center;background:var(--sf2);border-radius:var(--r);padding:8px;margin-bottom:6px}
.ir-order{grid-template-columns:3fr 60px 90px 60px 70px 28px}
.ir-po{grid-template-columns:3fr 70px 90px 80px 28px}
.ir-loan{grid-template-columns:3fr 70px 70px 28px}
.ir input,.ir select{font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);color:var(--tx);width:100%;outline:none}
.ir input:focus{border-color:var(--ac)}
/* loading */
.ld{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--tx3);gap:10px}
.sp{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* alert */
.al{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:13px}
.al-s{background:var(--acl);color:var(--ac)}.al-e{background:var(--rdl);color:var(--rd)}.al-w{background:var(--aml);color:var(--am)}
/* stock color */
.ok{color:var(--ac);font-weight:600}.lw{color:var(--am);font-weight:600}.ze{color:var(--rd);font-weight:600}
/* detail grid */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dr{display:flex;flex-direction:column;gap:2px}
.dlb{font-size:10px;color:var(--tx3);font-weight:500;text-transform:uppercase}
.dv{font-size:13px}
/* inner table */
.itb{width:100%;border-collapse:collapse;margin-top:6px}
.itb th{font-size:10px;color:var(--tx3);padding:5px 7px;text-align:left;background:var(--sf2)}
.itb td{padding:6px 7px;border-top:1px solid var(--bd);font-size:13px}
/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1e4d1e;color:#fff;padding:9px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
/* tabs */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--bd);margin-bottom:14px}
.tab{padding:7px 13px;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
/* search box in toolbar */
.si{position:relative}
.si input{padding:6px 8px 6px 27px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;background:var(--bg);color:var(--tx);width:185px;outline:none}
.si input:focus{border-color:var(--ac)}
.si svg{position:absolute;left:7px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--tx3);pointer-events:none}
.num{font-variant-numeric:tabular-nums}
/* print */
@media print{
  .sdb,.ph .ha,.btn,.pg,.no-print{display:none!important}
  .sdb{display:none!important}
  .main{margin-left:0!important}
  .ph{position:static}
  body{font-size:12px}
  .print-only{display:block!important}
}
.print-only{display:none}
/* price grid for product */
.pg7{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
/* section header */
.sh{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
@media(max-width:768px){
  .sdb{position:fixed;top:0;left:0;bottom:0;z-index:300;transform:translateX(-100%);transition:transform .25s ease;width:240px!important;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sdb.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0!important}
  .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;padding:7px;cursor:pointer;border:none;background:var(--sf2);border-radius:var(--r);flex-shrink:0}
  .hamburger span{display:block;height:2px;background:var(--tx);border-radius:2px}
  .hamburger-hide{display:none}
  .ph{padding:10px 14px;gap:8px}
  .pt{font-size:14px}.ps{font-size:10px}
  .ha{gap:5px;flex-wrap:wrap}
  .btn{padding:6px 10px;font-size:12px}
  .btn-s{padding:4px 7px;font-size:11px}
  .pc{padding:10px 12px}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:480px}
  th,td{padding:7px 9px;font-size:12px}
  .mg{grid-template-columns:1fr 1fr;gap:8px}
  .mc{padding:10px 12px}
  .mv{font-size:18px}
  .fg,.fg3{grid-template-columns:1fr}
  .fl input,.fl select,.fl textarea{font-size:15px;padding:8px 10px}
  .mo{padding:0;align-items:flex-end}
  .md,.md-lg{border-radius:var(--rl) var(--rl) 0 0;max-width:100%!important;max-height:90vh;overflow-y:auto}
  .mb{padding:14px}
  .mh{padding:13px 15px 10px}
  .ir-order{grid-template-columns:2fr 48px 68px 48px 58px 26px}
  .ir-po{grid-template-columns:2fr 48px 68px 48px 58px 26px}
  .ir-loan{grid-template-columns:2fr 68px 26px}
  .dg{grid-template-columns:1fr}
  .tab{padding:7px 11px;font-size:12px}
  .si input{width:135px}
  .sdb .logo h1,.sdb .logo p,.sdb .ni span,.sdb .ns{display:block!important}
  .sdb .ni{padding:9px 16px!important;justify-content:flex-start!important;gap:9px!important}
}
@media(max-width:400px){
  .mg{grid-template-columns:1fr}
  .ha .btn{font-size:11px;padding:4px 6px}
  .ir-order{grid-template-columns:2fr 44px 60px 44px 55px 24px}
}
</style>
</head>
<body>
<div class="app">
<aside class="sdb">
  <div class="logo"><h1>慢樂仙坊</h1><p>進銷存管理系統</p></div>
  <div class="ns">總覽</div>
  <div class="ni on" data-p="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>總覽</span></div>
  <div class="ns">庫存</div>
  <div class="ni" data-p="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>商品庫存</span></div>
  <div class="ni" data-p="purchase"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>進貨管理</span></div>

  <div class="ni" data-p="loans"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg><span>借貨管理</span></div>
  <div class="ns">客戶</div>
  <div class="ni" data-p="customers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>客戶資料</span></div>
  <div class="ns">活動</div>
  <div class="ni" data-p="promotions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span>活動/套組</span></div>
  <div class="ns">財務</div>
  <div class="ni" data-p="accounts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>對帳記錄</span></div>
  <div class="ni" data-p="bonus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg><span>獎金/分潤</span></div>
  <div class="ns">系統</div>
  <div class="ni" data-p="vendors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg><span>廠商管理</span></div>
</aside>
<div class="sidebar-overlay" id="sdbOverlay" onclick="closeSidebar()"></div>
<main class="main" id="main"><div class="ld"><div class="sp"></div>載入中…</div></main>
</div>
<div class="mo" id="modal"><div class="md" id="md"><div class="mh"><span class="mt" id="mtitle"></span><button class="btn btn-s" onclick="CM()">✕</button></div><div class="mb" id="mbody"></div><div class="mf" id="mfoot"></div></div></div>
<div class="toast" id="toast"></div>

<script>
const SURL='https://tctqjjzokixjktiokvtt.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjdHFqanpva2l4amt0aW9rdnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTQ0MjksImV4cCI6MjA5OTA3MDQyOX0.guft3uykLi7yUOakmlu9yOR3Or-3bk2gwC4Bd7zXnQ0';
let sb, _cp;

// boot
window.addEventListener('error',e=>{
  const m=document.getElementById('main');
  if(m&&m.innerHTML.includes('sp')){m.innerHTML='<div class="ld" style="flex-direction:column;gap:12px"><span style="color:var(--rd)">JS錯誤：'+e.message+'</span><span style="font-size:12px;color:var(--tx3)">'+e.filename+' 行'+e.lineno+'</span></div>';}
});
(function(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload=()=>{
    try{
      sb=supabase.createClient(SURL,SKEY);
    }catch(e){
      document.getElementById('main').innerHTML='<div class="ld" style="color:var(--rd)">Supabase 初始化失敗：'+e.message+'</div>';
      return;
    }
    document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',()=>go(el.dataset.p)));
    document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')CM();});
    try{sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>{if(_cp)_cp();}).on('postgres_changes',{event:'*',schema:'public',table:'sales_orders'},()=>{if(_cp)_cp();}).subscribe();}catch(e){}
    loadPayMethods().then(()=>go('dashboard'));
  };
  s.onerror=()=>{document.getElementById('main').innerHTML='<div class="ld" style="color:var(--rd)">無法載入Supabase Library，請檢查網路</div>';};
  document.head.appendChild(s);
})();

// ── nav ──
function go(p){
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.dataset.p===p));
  document.getElementById('main').innerHTML='<div class="ld"><div class="sp"></div>載入中…</div>';
  _cp=pages[p]; pages[p]?.();
}

// ── modal ──
function CM(){document.getElementById('modal').classList.remove('open');}
function OM(title,body,foot,lg){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mfoot').innerHTML=foot||'<button class="btn" onclick="CM()">關閉</button>';
  const md=document.getElementById('md');
  md.className='md'+(lg?' md-lg':'');
  document.getElementById('modal').classList.add('open');
}

// ── toast ──
let _tt;
function toast(msg,t){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=t==='e'?'var(--rd)':t==='w'?'var(--am)':'#1e4d1e';
  el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2800);
}

// ── helpers ──
const $=id=>document.getElementById(id);
const v=id=>{const el=$('f-'+id);return el?el.value.trim():'';}
const n=id=>{const x=parseFloat($('f-'+id)?.value);return isNaN(x)?null:x;}
const fM=x=>x==null?'—':'$'+Math.round(Number(x)||0).toLocaleString('zh-TW');
const fN=x=>x==null?'—':Number(x).toLocaleString('zh-TW');
const fD=x=>x?x.slice(0,10):'—';
const today=()=>new Date().toISOString().slice(0,10);
const ym=d=>(d||today()).slice(0,7);

const LEVELS=['創始','大區','市代','經銷','VIP','零售'];
const LEVEL_COLS={創始:'price_founder',大區:'price_region',市代:'price_city',經銷:'price_dealer',VIP:'price_vip',零售:'price_retail'};
function lvBadge(l){
  const cls={創始:'bbr',大區:'bbr',市代:'bb',經銷:'bg',VIP:'ba',零售:'bgr'};
  return `<span class="badge ${cls[l]||'bgr'}">${l||'—'}</span>`;
}
function skCls(n){return n<=0?'ze':n<=5?'lw':'ok';}
function fi(id,lbl,type,val,ph){return `<div class="fl"><label>${lbl}</label><input id="f-${id}" type="${type||'text'}" value="${(val||'').toString().replace(/"/g,'&quot;')}" placeholder="${ph||''}"></div>`;}
function fs(id,lbl,opts,val){return `<div class="fl"><label>${lbl}</label><select id="f-${id}">${opts.map(o=>`<option value="${o}" ${o==val?'selected':''}>${o}</option>`).join('')}</select></div>`;}
function fa(id,lbl,val){return `<div class="fl"><label>${lbl}</label><textarea id="f-${id}" rows="2">${val||''}</textarea></div>`;}

// ── Searchable Select Component ──
// Creates a searchable product picker
// id: unique id, items: [{value,label,data}], onSelect: fn(value,data)
let _ssState={};
function createSS(id,items,placeholder,selectedVal){
  const sel=items.find(x=>x.value===selectedVal);
  return `<div class="ss-wrap" id="ss-${id}">
    <input class="ss-input" id="ss-inp-${id}" placeholder="${placeholder||'搜尋…'}" value="${sel?sel.label:''}" autocomplete="off"
      oninput="ssFilter('${id}',this.value)"
      onfocus="ssOpen('${id}')"
      onblur="setTimeout(()=>ssClose('${id}'),200)">
    <input type="hidden" id="ss-val-${id}" value="${selectedVal||''}">
    <div class="ss-drop" id="ss-drop-${id}"></div>
  </div>`;
}
function ssOpen(id){
  _ssState[id]=_ssState[id]||{};
  ssFilter(id,$('ss-inp-'+id).value);
  $('ss-drop-'+id).classList.add('open');
}
function ssClose(id){$('ss-drop-'+id)?.classList.remove('open');}
function ssFilter(id,q){
  const items=_ssState[id]?.items||[];
  const filtered=q?items.filter(x=>x.label.toLowerCase().includes(q.toLowerCase())):items;
  const drop=$('ss-drop-'+id);
  if(!drop)return;
  if(!filtered.length){drop.innerHTML=`<div class="ss-opt no">無符合結果</div>`;return;}
  drop.innerHTML=filtered.slice(0,50).map(x=>`<div class="ss-opt" onmousedown="ssPick('${id}','${x.value.replace(/'/g,"\\'")}','${x.label.replace(/'/g,"\\'")}')">${x.label}</div>`).join('');
}
function ssPick(id,val,lbl){
  $('ss-val-'+id).value=val;
  $('ss-inp-'+id).value=lbl;
  ssClose(id);
  if(_ssState[id]?.onChange) _ssState[id].onChange(val);
}
function ssGet(id){return $('ss-val-'+id)?.value||'';}
function ssInit(id,items,onChange){_ssState[id]={items,onChange};}

async function saveProd(existingNo){
  const no=existingNo||v('pno'), nm=v('pname');
  if(!nm){toast('請填寫商品名稱','e');return;}
  const priceFields={price_founder:n('pf'),price_region:n('prg'),price_city:n('pct'),price_dealer:n('pdr'),price_vip:n('pvp'),price_retail:n('prl'),cost:n('pcost')};
  const obj={name:nm,spec:v('pspec')||null,category:v('pcat')||null,unit:v('punit')||'個',stock:n('pstock')||0,...priceFields,description:v('pdesc')||null};
  let err;
  if(existingNo){
    // 比對舊價格，有變動則記錄
    const{data:old}=await sb.from('products').select('price_founder,price_region,price_city,price_dealer,price_vip,price_retail,cost').eq('product_no',existingNo).single();
    if(old){
      const priceNames={price_founder:'創始',price_region:'大區',price_city:'市代',price_dealer:'經銷',price_vip:'VIP',price_retail:'零售',cost:'進貨價'};
      const logs=[];
      for(const[col,label] of Object.entries(priceNames)){
        const ov=old[col],nv=priceFields[col];
        if(ov!==nv&&(ov!=null||nv!=null)) logs.push({product_no:existingNo,price_type:label,old_price:ov,new_price:nv,change_date:today(),note:'編輯更新'});
      }
      if(logs.length) await sb.from('product_price_logs').insert(logs);
    }
    ({error:err}=await sb.from('products').update(obj).eq('product_no',existingNo));
  } else {
    if(!no){toast('請填寫商品編號','e');return;}
    obj.product_no=no;
    ({error:err}=await sb.from('products').insert(obj));
  }
  if(err){toast('儲存失敗：'+err.message,'e');return;}
  toast(existingNo?'商品已更新':'商品新增成功！');CM();products();
}

async function doAdj(no,cur){
  const t=v('adjt'),q=n('adjq')||0;

  const{error}=await sb.from('products').update({stock:ns}).eq('product_no',no);

  toast(`庫存已調整為 ${ns}`);CM();products();
}

function updateItemPricesByLevel(lv){
  const col=LEVEL_COLS[lv]||'price_retail';
  _items.forEach(item=>{

  });
  renderItems();
}

function getItemProdOpts(selPno){
  return `<option value="">搜尋商品…</option>`+_allProds.map(p=>`<option value="${p.product_no}" ${p.product_no===selPno?'selected':''}>${p.name}${p.spec?` (${p.spec})`:''} [庫${p.stock}]</option>`).join('');
}

function renderItems(){
  const area=$('itemsArea');if(!area)return;
  area.innerHTML=_items.map(item=>`
  <div class="ir ir-order">

      <input type="text" value="${item.pno?(_allProds.find(p=>p.product_no===item.pno)?.name||item.pno):''}" placeholder="輸入關鍵字搜尋商品…"

window.filterItemDrop=(id,q)=>{
  const drop=$('idrop-'+id);if(!drop)return;
  const fil=q?_allProds.filter(p=>p.name.includes(q)||(p.product_no||'').includes(q)||(p.spec||'').includes(q)):_allProds;
  drop.style.display='block';
  drop.innerHTML=fil.slice(0,30).map(p=>`<div style="padding:6px 9px;font-size:12px;cursor:pointer" onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''" onmousedown="pickItem(${id},'${p.product_no.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}')">
    ${p.name}${p.spec?` (${p.spec})`:''} <span style="color:var(--tx3)">庫存:${p.stock}</span>
  </div>`).join('')||'<div style="padding:6px 9px;font-size:12px;color:var(--tx3)">無結果</div>';
};
window.closeItemDrop=id=>{const d=$('idrop-'+id);if(d)d.style.display='none';};
window.pickItem=(id,pno,name)=>{
  const it=_items.find(x=>x.id===id);if(!it)return;
  it.pno=pno;
  const p=_allProds.find(x=>x.product_no===pno);
  if(p){
    const lv=v('oalv')||'零售';
    const col=LEVEL_COLS[lv]||'price_retail';
    it.price=p[col]||p.price_retail||0;
  }
  it.amt=it.qty*(it.price||0);
  renderItems();
  // set input text
  const inp=document.querySelector(`#idrop-${id}`)?.previousElementSibling;
  if(inp) inp.value=name;
  closeItemDrop(id);
};
window.addItem=()=>{_items.push({id:Date.now(),pno:'',qty:1,price:0,giftQty:0,amt:0});renderItems();};
window.rmItem=id=>{_items=_items.filter(x=>x.id!==id);renderItems();};
window.setIQ=(id,val)=>{const it=_items.find(x=>x.id===id);if(it){it.qty=Math.max(1,+val||1);it.amt=it.qty*it.price;}renderItems();};
window.setIV=(id,val)=>{const it=_items.find(x=>x.id===id);if(it){it.price=+val||0;it.amt=it.qty*it.price;}renderItems();};
window.setIG=(id,val)=>{const it=_items.find(x=>x.id===id);if(it)it.giftQty=Math.max(0,+val||0);};
function updAmt(){
  const el=$('oAmt');if(!el)return;
  const sub=_items.reduce((s,i)=>s+i.amt,0);

}

async function saveOrder(editNo){
  const no=editNo||v('ono'), nm=v('oname'), dt=v('odate');
  if(!no||!nm){toast('請填寫訂單號和客戶名稱','e');return;}
  const its=_items.filter(i=>i.pno&&i.qty>0);
  if(!its.length){toast('請至少選一項商品','e');return;}
  const sub=its.reduce((s,i)=>s+i.amt,0),fee=n('ofee')||0,tax=0,total=sub+fee;
  const payload={order_date:dt,customer_name:nm,phone:v('ophone'),ship_address:v('oaddr'),payment_method:v('opay'),shipping_method:v('oshp'),shipping_fee:fee,note:v('onote'),agent_level:v('oalv'),invoice_no:v('oinv')||null,subtotal:sub,tax,total,payment_done:editNo?undefined:false,products_summary:its.map(i=>(_allProds.find(p=>p.product_no===i.pno)?.name||i.pno)).join('、')};
  if(editNo){
    await sb.from('sales_order_items').delete().eq('order_no',editNo);
    const{error}=await sb.from('sales_orders').update(payload).eq('order_no',editNo);
    if(error){toast('修改失敗：'+error.message,'e');return;}
  } else {
    payload.order_no=no;payload.payment_done=false;
    const{error}=await sb.from('sales_orders').insert(payload);
    if(error){toast('建立失敗：'+error.message,'e');return;}
  }
  const rows=its.map(i=>{const p=_allProds.find(x=>x.product_no===i.pno);return{order_no:no,product_no:i.pno,product_name:i._pname||p?.name||i.pno,unit_price:i.price,qty:i.qty,gift_qty:i.giftQty||0,actual_qty:(i.qty||0)+(i.giftQty||0),amount:i.amt,year_month:ym(dt),promo_code:i.promo_code||null,bundle_group:i.bundle_group||null,is_bundle_item:!!(i.promo_code)};});
  await sb.from('sales_order_items').insert(rows);

  }
  toast(editNo?'訂單已修改！':'訂單建立成功！庫存已自動扣除');CM();orders();
}

async function doShipment(no,its){
  no=no||window._shipNo; its=its||window._shipIts;
  const sdt=v('sdt')||today();
  let allShipped=true, anyShipped=false;
  for(const i of its){
    const shipQty=parseFloat($('f-ship-'+i.id)?.value)||0;
    if(shipQty<=0) continue;
    anyShipped=true;
    const newShipped=Math.min((i.qty||0)+(i.gift_qty||0),(i.shipped_qty||0)+shipQty);
    await sb.from('sales_order_items').update({shipped_qty:newShipped}).eq('id',i.id);
    // 再查一次確認是否全部出完
    if(newShipped<(i.qty||0)+(i.gift_qty||0)) allShipped=false;
  }
  // 重新確認所有 items
  const{data:updatedIts}=await sb.from('sales_order_items').select('qty,gift_qty,shipped_qty').eq('order_no',no);
  const allDone=(updatedIts||[]).every(i=>(i.shipped_qty||0)>=(i.qty||0)+(i.gift_qty||0));
  const partDone=(updatedIts||[]).some(i=>(i.shipped_qty||0)>0);
  const status=allDone?'全部出貨':partDone?'部分出貨':'待出貨';
  await sb.from('sales_orders').update({ship_status:status,actual_ship_date:allDone?sdt:null}).eq('order_no',no);
  toast('出貨記錄已更新！');CM();orders();
}

async function doReceipt(no,its){
  no=no||window._recvNo; its=its||window._recvIts;
  for(const i of its){
    const recvQty=parseFloat($('f-recv-'+i.id)?.value)||0;
    if(recvQty<=0) continue;
    const newRecv=Math.min((i.qty||0)+(i.gift_qty||0),(i.received_qty||0)+recvQty);
    await sb.from('purchase_order_items').update({received_qty:newRecv}).eq('id',i.id);
    // 增加庫存（已收貨部分）
    const{data:p}=await sb.from('products').select('stock').eq('product_no',i.product_no).single();
    if(p) await sb.from('products').update({stock:p.stock+recvQty}).eq('product_no',i.product_no);
  }
  const{data:updIts}=await sb.from('purchase_order_items').select('qty,gift_qty,received_qty').eq('po_no',no);
  const allDone=(updIts||[]).every(i=>(i.received_qty||0)>=(i.qty||0)+(i.gift_qty||0));
  const partDone=(updIts||[]).some(i=>(i.received_qty||0)>0);
  const status=allDone?'全部收貨':partDone?'部分收貨':'待收貨';
  await sb.from('purchase_orders').update({receipt_status:status,done:allDone}).eq('po_no',no);
  toast('收貨記錄已更新！庫存已增加');CM();purchase();
}

window.filterPODrop=(id,q)=>{const drop=$('podrop-'+id);if(!drop)return;drop.style.display='block';const fil=q?_poProds.filter(p=>p.name.includes(q)||(p.product_no||'').includes(q)):_poProds;drop.innerHTML=fil.slice(0,30).map(p=>`<div style="padding:6px 9px;font-size:12px;cursor:pointer" onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''" onmousedown="pickPOItem(${id},'${p.product_no.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}',${p.cost||0})">${p.name}${p.spec?` (${p.spec})`:''}</div>`).join('')||'<div style="padding:6px 9px;font-size:12px;color:var(--tx3)">無結果</div>';};
window.closePODrop=id=>{const d=$('podrop-'+id);if(d)d.style.display='none';};
window.pickPOItem=(id,pno,name,cost)=>{const it=_poItems.find(x=>x.id===id);if(!it)return;it.pno=pno;it.price=cost||0;it.amt=it.qty*it.price;renderPOItems();const inp=document.querySelector(`#podrop-${id}`)?.previousElementSibling;if(inp)inp.value=name;closePODrop(id);};
window.addPOItem=()=>{_poItems.push({id:Date.now(),pno:'',qty:1,price:0,amt:0});renderPOItems();};
window.rmPOItem=id=>{_poItems=_poItems.filter(x=>x.id!==id);renderPOItems();};
window.setPOIQ=(id,val)=>{const it=_poItems.find(x=>x.id===id);if(it){it.qty=Math.max(1,+val||1);it.amt=it.qty*it.price;}renderPOItems();};
window.setPOIV=(id,val)=>{const it=_poItems.find(x=>x.id===id);if(it){it.price=+val||0;it.amt=it.qty*it.price;}renderPOItems();};
function updPOAmt(){const el=$('poAmt');if(!el)return;const sub=_poItems.reduce((s,i)=>s+i.amt,0);const tax=Math.round(sub*0.05);el.innerHTML=`合計：<span style="color:var(--br)">${fM(sub+tax)}</span>`;}

async function savePO(editNo){
  const no=editNo||v('pono'), vn=v('povname'), dt=v('podt');
  if(!no||!vn){toast('請填寫進貨單號和廠商名稱','e');return;}
  const its=_poItems.filter(i=>i.pno&&i.qty>0);
  const sub=its.reduce((s,i)=>s+i.amt,0),tax=Math.round(sub*0.05),total=sub+tax;
  const payload={po_date:dt,vendor_name:vn,payment_method:v('popay'),invoice_no:v('poinv')||null,note:v('ponote'),subtotal:sub,tax,total,products_summary:its.map(i=>(_poProds.find(p=>p.product_no===i.pno)?.name||i.pno)).join('、')};
  if(editNo){
    await sb.from('purchase_order_items').delete().eq('po_no',editNo);
    await sb.from('purchase_orders').update(payload).eq('po_no',editNo);
  } else {
    payload.po_no=no;payload.done=false;
    const{error}=await sb.from('purchase_orders').insert(payload);
    if(error){toast('建立失敗：'+error.message,'e');return;}
  }
  if(its.length){
    await sb.from('purchase_order_items').insert(its.map(i=>{const p=_poProds.find(x=>x.product_no===i.pno);return{po_no:no,product_no:i.pno,product_name:p?.name||i.pno,spec:p?.spec,unit_price:i.price,qty:i.qty,amount:i.amt,po_date:dt};}));
    if(!editNo){for(const i of its){const{data:p}=await sb.from('products').select('stock').eq('product_no',i.pno).single();if(p)await sb.from('products').update({stock:p.stock+i.qty}).eq('product_no',i.pno);}}
  }
  toast(editNo?'進貨單已修改！':'進貨單建立成功！庫存已自動增加');CM();purchase();
}
async function togglePO(no,done){await sb.from('purchase_orders').update({done:!done}).eq('po_no',no);toast(!done?'已標記完成':'已取消完成');purchase();}

async function addCust(){
  // 自動產生下一個客戶編號
  // 只抓 C-00001 ~ C-09999 格式，排除特殊號碼
  const{data:last}=await sb.from('customers').select('customer_no').like('customer_no','C-0____').order('customer_no',{ascending:false}).limit(5);
  let nextNo='C-00001';
  if(last&&last.length){
    const nums=last.map(r=>{const m=r.customer_no?.match(/^C-0(\d{4})$/);return m?parseInt('0'+m[1]):0;}).filter(n=>n>0&&n<10000);
    if(nums.length){const mx=Math.max(...nums);nextNo='C-'+String(mx+1).padStart(5,'0');}
  }
  OM('新增客戶',custForm({customer_no:nextNo}),`<button class="btn" onclick="CM()">取消</button><button class="btn btn-p" onclick="saveCust(false)">新增</button>`);
}

function renderLoanItems(){
  const area=$('loanArea');if(!area)return;
  area.innerHTML=_loanItems.map(item=>`
  <div class="ir ir-loan">
    <div style="position:relative">
      <input type="text" value="${item.pno?(_loanProds.find(p=>p.product_no===item.pno)?.name||item.pno):''}" placeholder="輸入關鍵字搜尋商品…"
        style="font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);width:100%;outline:none"
        oninput="filterLoanDrop(${item.id},this.value)" onfocus="filterLoanDrop(${item.id},this.value)"
        onblur="setTimeout(()=>closeLoanDrop(${item.id}),200)">
      <div id="ldrop-${item.id}" style="position:absolute;top:100%;left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);max-height:160px;overflow-y:auto;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
    </div>
    <input type="number" value="${item.qty}" min="1" onchange="setLoanIQ(${item.id},this.value)" placeholder="數量" style="font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);width:100%;outline:none">
    <span style="font-size:12px;color:var(--tx3)">已借${item.pno?(_loanProds.find(p=>p.product_no===item.pno)?.stock||0):'—'}件庫存</span>
    <button onclick="rmLoanItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:18px;line-height:1">×</button>
  </div>`).join('');
}
window.filterLoanDrop=(id,q)=>{const drop=$('ldrop-'+id);if(!drop)return;drop.style.display='block';const fil=q?_loanProds.filter(p=>p.name.includes(q)||(p.product_no||'').includes(q)):_loanProds;drop.innerHTML=fil.slice(0,30).map(p=>`<div style="padding:6px 9px;font-size:12px;cursor:pointer" onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''" onmousedown="pickLoanItem(${id},'${p.product_no.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}')">
  ${p.name}${p.spec?` (${p.spec})`:''} <span style="color:var(--tx3)">庫存:${p.stock}</span></div>`).join('')||'<div style="padding:6px 9px;font-size:12px;color:var(--tx3)">無結果</div>';};
window.closeLoanDrop=id=>{const d=$('ldrop-'+id);if(d)d.style.display='none';};
window.pickLoanItem=(id,pno,name)=>{const it=_loanItems.find(x=>x.id===id);if(it){it.pno=pno;}renderLoanItems();const inp=document.querySelector(`#ldrop-${id}`)?.previousElementSibling;if(inp)inp.value=name;closeLoanDrop(id);};
window.addLoanItem=()=>{_loanItems.push({id:Date.now(),pno:'',qty:1});renderLoanItems();};
window.rmLoanItem=id=>{_loanItems=_loanItems.filter(x=>x.id!==id);renderLoanItems();};
window.setLoanIQ=(id,val)=>{const it=_loanItems.find(x=>x.id===id);if(it)it.qty=Math.max(1,+val||1);};

async function saveLoan(){
  const no=v('lno'),nm=v('lname'),dt=v('ldt'),dir=v('ldir');
  if(!no||!nm){toast('請填寫單號和客戶名稱','e');return;}
  const its=_loanItems.filter(i=>i.pno&&i.qty>0);
  if(!its.length){toast('請至少選一項商品','e');return;}
  await sb.from('loan_orders').insert({loan_no:no,loan_date:dt,direction:dir,customer_name:nm,phone:v('lph'),agent_level:v('llv'),address:v('laddr'),shipping_method:v('lshp'),note:v('lnote'),return_status:'未歸還',returned:false,products_summary:its.map(i=>(_loanProds.find(p=>p.product_no===i.pno)?.name||i.pno)).join('、'),year_month:ym(dt)});
  await sb.from('loan_order_items').insert(its.map(i=>{const p=_loanProds.find(x=>x.product_no===i.pno);return{loan_no:no,product_no:i.pno,product_name:p?.name||i.pno,spec:p?.spec,qty:i.qty,returned_qty:0};}));
  // 連動庫存
  for(const i of its){
    const{data:p}=await sb.from('products').select('stock').eq('product_no',i.pno).single();
    if(p){const ns=dir==='借出'?Math.max(0,p.stock-i.qty):p.stock+i.qty;await sb.from('products').update({stock:ns}).eq('product_no',i.pno);}
  }
  toast('借貨單建立成功！庫存已更新');CM();loans();
}

async function returnLoan(no){
  const[{data:l},{data:its}]=await Promise.all([
    sb.from('loan_orders').select('*').eq('loan_no',no).single(),
    sb.from('loan_order_items').select('*').eq('loan_no',no),
  ]);
  const td=today();
  OM(`記錄歸還：${no}`,`
  <div style="margin-bottom:12px">

  </div>
  <table class="itb"><tr><th>商品</th><th>借出數</th><th>已歸還</th><th>本次歸還數</th></tr>

    <td class="num">${fN(i.qty)}</td>
    <td class="num">${fN(i.returned_qty||0)}</td>
    <td><input type="number" id="f-ret-${i.id}" value="${i.qty-(i.returned_qty||0)}" min="0" max="${i.qty-(i.returned_qty||0)}" style="width:70px;padding:4px 6px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none"></td>
  </tr>`).join('')}
  </table>`,
  `<button class="btn" onclick="CM()">取消</button><button class="btn btn-p" onclick="doReturn('${no}',${JSON.stringify(its)})">確認歸還</button>`);
}
async function doReturn(no,its){
  const rdt=v('rdt')||today();
  let allReturned=true, anyReturned=false;
  for(const i of its){
    const retQty=parseFloat($('f-ret-'+i.id)?.value)||0;
    const newRet=Math.min(i.qty,(i.returned_qty||0)+retQty);
    if(newRet<i.qty) allReturned=false;
    if(retQty>0){
      anyReturned=true;
      await sb.from('loan_order_items').update({returned_qty:newRet,return_date:rdt}).eq('id',i.id);
      // 連動庫存（歸還則補回庫存）
      const{data:p}=await sb.from('products').select('stock').eq('product_no',i.product_no).single();
      if(p) await sb.from('products').update({stock:p.stock+retQty}).eq('product_no',i.product_no);
    }
  }
  const status=allReturned?'全部歸還':anyReturned?'部分歸還':'未歸還';
  await sb.from('loan_orders').update({return_status:status,returned:allReturned,return_date:allReturned?rdt:null}).eq('loan_no',no);
  toast('歸還記錄已更新！庫存已連動');CM();loans();
}

function addBonus(){

async function saveBonus(){

async function accounts(){

    </table></div></div>
    <div class="tc"><div class="tb"><span class="tt">月度對帳（Ragic匯入）</span></div>
    <div class="tw"><table><tr><th>月份</th><th>收入</th><th>支出</th><th>結餘</th></tr>

function promoExtraFields(p) {

window.pickPromoItem = (id, pno, name) => {

window.rmPromoItem = id => { _promoItems = _promoItems.filter(x => x.id !== id); renderPromoItems(); };
window.setPromoIQ = (id, val) => { const it = _promoItems.find(x => x.id === id); if (it) it.qty = Math.max(1, +val || 1); };
window.setPromoIV = (id, val) => { const it = _promoItems.find(x => x.id === id); if (it) it.price_override = +val || null; };
window.setPromoIG = (id, checked) => { const it = _promoItems.find(x => x.id === id); if (it) it.is_gift = checked; };

async function savePromo(editCode) {
  const code = v('pcode'), name = v('pname'), type = v('ptype');
  if (!code || !name) { toast('請填寫代碼和名稱', 'e'); return; }
  const payload = {
    promo_code: code, name, type,
    start_date: v('pstart') || null, end_date: v('pend') || null,
    description: v('pdesc') || null, note: v('pnote') || null,
    bundle_price: null, discount_amount: null, discount_pct: null, buy_qty: null, get_qty: null,
  };
  if (type === '固定套組') payload.bundle_price = parseFloat($('f-pbprice')?.value) || null;
  if (type === '買幾送幾') { payload.buy_qty = parseFloat($('f-pbuy')?.value) || null; payload.get_qty = parseFloat($('f-pget')?.value) || null; }
  if (type === '折扣金額') payload.discount_amount = parseFloat($('f-pdamt')?.value) || null;
  if (type === '百分比折扣') payload.discount_pct = parseFloat($('f-pdpct')?.value) || null;

  if (editCode) {
    await sb.from('promotions').update(payload).eq('promo_code', editCode);
    await sb.from('promotion_items').delete().eq('promo_code', editCode);
  } else {
    payload.is_active = true;
    const { error } = await sb.from('promotions').insert(payload);
    if (error) { toast('新增失敗：' + error.message, 'e'); return; }
  }
  const items = _promoItems.filter(i => i.pno).map(i => ({
    promo_code: code, product_no: i.pno, product_name: i.name, qty: i.qty, is_gift: i.is_gift, price_override: i.price_override || null
  }));
  if (items.length) await sb.from('promotion_items').insert(items);
  toast(editCode ? '套組已更新' : '套組新增成功！'); CM(); promotions();
}

async function togglePromo(code, active) {
  await sb.from('promotions').update({ is_active: !active }).eq('promo_code', code);
  toast(!active ? '已啟用' : '已停用'); promotions();
}

async function openBundlePicker(mode) {
  // mode: 'order' | 'po' | 'loan'
  const today_s = today();
  const { data: promos } = await sb.from('promotions').select('*')
    .eq('is_active', true)
    .or(`end_date.is.null,end_date.gte.${today_s}`)

  OM('選用套組/活動', `
  <div class="al al-w" style="font-size:12px">選擇後，套組內的所有商品會自動展開加入品項清單（贈品以橙色標示）。</div>
  ${(promos || []).length === 0 ? '<div style="color:var(--tx3);padding:20px;text-align:center">目前無有效套組</div>' :

    <div style="border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:background .1s"
      onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''"
      onclick="applyPromo('${p.promo_code}','${mode}')">

        <span style="font-weight:500">${p.name}</span>

      </div>

        ${p.description || ''} ${p.bundle_price ? `・套組價 ${fM(p.bundle_price)}` : ''} 
        ${p.end_date ? `・有效至 ${p.end_date}` : ''}
      </div>
    </div>`).join('')}`, '');
}

async function applyPromo(code, mode) {
  const [{ data: p }, { data: its }] = await Promise.all([
    sb.from('promotions').select('*').eq('promo_code', code).single(),
    sb.from('promotion_items').select('*').eq('promo_code', code).order('is_gift'),
  ]);
  if (!its || !its.length) { toast('此套組尚無商品設定', 'w'); return; }

  const today_s = today();
  if (p.end_date && p.end_date < today_s) { toast('此套組已過有效期！', 'e'); return; }

  const bundleGroup = 'BG-' + Date.now();

  if (mode === 'order') {
    // 取得客戶位階決定售價
    const lv = $('f-oalv')?.value || '零售';
    const col = LEVEL_COLS[lv] || 'price_retail';

    for (const i of its) {
      const { data: prod } = await sb.from('products').select('product_no,name,spec,stock,' + col).eq('product_no', i.product_no).single();
      const unitPrice = i.is_gift ? 0 : (i.price_override || prod?.[col] || 0);
      const newItem = {
        id: Date.now() + Math.random(),
        pno: i.product_no,
        qty: i.qty,
        price: unitPrice,
        giftQty: 0,
        amt: i.is_gift ? 0 : (i.qty * unitPrice),
        is_gift: i.is_gift,
        promo_code: code,
        bundle_group: bundleGroup,
        _pname: i.product_name || prod?.name || i.product_no,
      };
      _items.push(newItem);
    }
    // 套組折扣
    if (p.discount_amount) {
      _items.push({ id: Date.now(), pno: 'DISCOUNT', qty: 1, price: -p.discount_amount, giftQty: 0, amt: -p.discount_amount, _pname: `套組折扣 (${p.name})`, promo_code: code, bundle_group: bundleGroup });
    }
    CM();
    renderItems();
    toast('套組已展開，請確認品項', 's');
  } else if (mode === 'po') {
    for (const i of its) {
      _poItems.push({ id: Date.now() + Math.random(), pno: i.product_no, qty: i.qty, price: i.price_override || 0, giftQty: i.is_gift ? i.qty : 0, amt: i.is_gift ? 0 : i.qty * (i.price_override || 0), _pname: i.product_name || i.product_no, promo_code: code, bundle_group: bundleGroup });
    }
    CM();
    renderPOItems();
    toast('套組已展開至進貨品項', 's');
  } else if (mode === 'loan') {
    for (const i of its) {
      _loanItems.push({ id: Date.now() + Math.random(), pno: i.product_no, qty: i.qty, _pname: i.product_name || i.product_no, promo_code: code, bundle_group: bundleGroup, is_gift: i.is_gift });
    }
    CM();
    renderLoanItems();
    toast('套組已展開至借貨品項', 's');
  }
}

<script>
// ════════════════════════════
//  拆袋/拆箱作業
// ════════════════════════════
let _splitItems = [], _splitProds = [];

async function openSplitBag() {
  const { data: prods } = await sb.from('products')
    .select('product_no,name,spec,stock,category')
    .not('product_no','is',null)
    .order('name');
  _splitProds = prods || [];
  _splitItems = [];

  OM('拆袋/拆箱作業', `
  <div class="al al-w" style="font-size:12px">
    <b>使用說明：</b>選擇要拆解的商品（如福袋），填入要拆出的數量，再填入拆解後各品項及數量。
    完成後系統自動扣除原品項庫存、增加各拆出品項庫存，並記錄備註。
  </div>
  <div class="sh">來源商品（要拆解的）</div>
  <div style="display:grid;grid-template-columns:3fr 80px;gap:8px;margin-bottom:4px;align-items:end">
    <div class="fl"><label>商品</label>
      <div style="position:relative">
        <input type="text" id="split-src-inp" placeholder="輸入關鍵字搜尋…"
          style="width:100%;padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none"
          oninput="filterSplitSrc(this.value)" onfocus="filterSplitSrc(this.value)"
          onblur="setTimeout(()=>$('split-src-drop')?.classList.remove('open'),200)">
        <input type="hidden" id="split-src-pno">
        <div id="split-src-drop" style="position:absolute;top:100%;left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);max-height:160px;overflow-y:auto;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
      </div>
    </div>
    <div class="fl"><label>拆解數量</label>
      <input type="number" id="split-src-qty" value="1" min="1"
        style="width:100%;padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none">
    </div>
  </div>
  <div id="split-src-info" style="font-size:12px;color:var(--tx2);margin-bottom:10px;padding:5px 8px;background:var(--sf2);border-radius:var(--r)">
    選擇商品後顯示目前庫存
  </div>
  <div class="sh">拆出品項</div>
  <div style="display:grid;grid-template-columns:3fr 80px 28px;gap:6px;padding:3px 6px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">
    <span>商品</span><span>數量</span><span></span>
  </div>
  <div id="splitItemsArea"></div>
  <button class="btn btn-s" onclick="addSplitItem()" style="margin-top:6px">＋ 加品項</button>
  <div style="margin-top:12px">
    <div class="fl"><label>備註</label>
      <input id="split-note" placeholder="例：愛閃耀福袋 2026/05 批次"
        style="width:100%;padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none">
    </div>
  </div>`,
  `<button class="btn" onclick="CM()">取消</button><button class="btn btn-p" onclick="doSplitBag()">確認拆袋（更新庫存）</button>`);

  window.filterSplitSrc = q => {
    const drop = $('split-src-drop'); if(!drop) return;
    const fil = q ? _splitProds.filter(p=>p.name.includes(q)||(p.product_no||'').includes(q)) : _splitProds;
    drop.style.display = 'block';
    drop.innerHTML = fil.slice(0,30).map(p=>
      `<div style="padding:6px 9px;font-size:12px;cursor:pointer"
        onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''"
        onmousedown="pickSplitSrc('${p.product_no.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}',${p.stock})">
        ${p.name}${p.spec?` (${p.spec})`:''} <span style="color:var(--tx3)">庫存:${p.stock}</span>
      </div>`
    ).join('') || '<div style="padding:6px 9px;font-size:12px;color:var(--tx3)">無結果</div>';
  };
  window.pickSplitSrc = (pno, name, stock) => {
    $('split-src-pno').value = pno;
    $('split-src-inp').value = name;
    $('split-src-drop').style.display = 'none';
    $('split-src-info').innerHTML = `<span style="font-weight:600">${name}</span> 目前庫存：<span style="font-weight:700;color:var(--ac)">${stock}</span>`;
  };
  renderSplitItems();
}

function renderSplitItems() {
  const area = $('splitItemsArea'); if(!area) return;
  area.innerHTML = _splitItems.map(item => `
  <div style="display:grid;grid-template-columns:3fr 80px 28px;gap:6px;align-items:center;background:var(--sf2);border-radius:var(--r);padding:7px;margin-bottom:5px">
    <div style="position:relative">
      <input type="text" value="${item.name||''}" placeholder="輸入關鍵字搜尋商品…"
        style="font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);width:100%;outline:none"
        oninput="filterSplitDrop(${item.id},this.value)" onfocus="filterSplitDrop(${item.id},this.value)"
        onblur="setTimeout(()=>closeSplitDrop(${item.id}),200)">
      <div id="sdrop-${item.id}" style="position:absolute;top:100%;left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);max-height:140px;overflow-y:auto;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
    </div>
    <input type="number" value="${item.qty||1}" min="1" onchange="setSplitIQ(${item.id},this.value)"
      style="font-size:12px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);width:100%;outline:none">
    <button onclick="rmSplitItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:18px;line-height:1">×</button>
  </div>`).join('');
}

window.filterSplitDrop = (id, q) => {
  const drop = $('sdrop-'+id); if(!drop) return;
  const fil = q ? _splitProds.filter(p=>p.name.includes(q)||(p.product_no||'').includes(q)) : _splitProds;
  drop.style.display = 'block';
  drop.innerHTML = fil.slice(0,30).map(p=>
    `<div style="padding:6px 9px;font-size:12px;cursor:pointer"
      onmouseover="this.style.background='var(--acl)'" onmouseout="this.style.background=''"
      onmousedown="pickSplitItem(${id},'${p.product_no.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}')">
      ${p.name}${p.spec?` (${p.spec})`:''} <span style="color:var(--tx3)">庫存:${p.stock}</span>
    </div>`
  ).join('') || '<div style="padding:6px 9px;font-size:12px;color:var(--tx3)">無結果</div>';
};
window.closeSplitDrop = id => { const d=$('sdrop-'+id); if(d) d.style.display='none'; };
window.pickSplitItem = (id, pno, name) => {
  const it = _splitItems.find(x=>x.id===id); if(!it) return;
  it.pno = pno; it.name = name;
  renderSplitItems();
  closeSplitDrop(id);
};
window.addSplitItem = () => { _splitItems.push({id:Date.now(),pno:'',name:'',qty:1}); renderSplitItems(); };
window.rmSplitItem = id => { _splitItems=_splitItems.filter(x=>x.id!==id); renderSplitItems(); };
window.setSplitIQ = (id, val) => { const it=_splitItems.find(x=>x.id===id); if(it) it.qty=Math.max(1,+val||1); };

async function doSplitBag() {
  const srcPno = $('split-src-pno')?.value;
  const srcQty = parseInt($('split-src-qty')?.value) || 1;
  const note = $('split-note')?.value || '拆袋作業';
  const outItems = _splitItems.filter(i=>i.pno && i.qty>0);

  if(!srcPno) { toast('請選擇來源商品（要拆解的）', 'e'); return; }
  if(!outItems.length) { toast('請至少新增一項拆出品項', 'e'); return; }

  // 確認來源庫存夠
  const {data:src} = await sb.from('products').select('name,stock').eq('product_no',srcPno).single();
  if(!src) { toast('找不到來源商品', 'e'); return; }
  if(src.stock < srcQty) {
    if(!confirm(`來源商品「${src.name}」庫存僅剩 ${src.stock}，確定要拆 ${srcQty} 個？`)) return;
  }

  // 扣除來源
  const newSrcStock = Math.max(0, src.stock - srcQty);
  await sb.from('products').update({stock: newSrcStock}).eq('product_no', srcPno);

  // 增加各拆出品項
  for(const item of outItems) {
    const {data:p} = await sb.from('products').select('stock').eq('product_no',item.pno).single();
    if(p) await sb.from('products').update({stock: p.stock + item.qty}).eq('product_no',item.pno);
  }

  // 記錄在庫存調整（用 products 備註或直接用 toast 告知）
  toast(`✅ 拆袋完成！「${src.name}」庫存 ${src.stock} → ${newSrcStock}，已增加 ${outItems.length} 項拆出品項`);
  CM();
  products(); // 刷新商品頁
}

window.openSplitBag = openSplitBag;
window.doSplitBag = doSplitBag;
</script>
<script>
// ── 漢堡選單 / 手機側欄 ──
function openSidebar(){
  document.querySelector('.sdb')?.classList.add('open');
  document.getElementById('sdbOverlay')?.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSidebar(){
  document.querySelector('.sdb')?.classList.remove('open');
  document.getElementById('sdbOverlay')?.classList.remove('open');
  document.body.style.overflow='';
}
// 點選選單項目後自動關閉側欄
document.querySelectorAll('.ni').forEach(el=>{
  el.addEventListener('click',()=>{ if(window.innerWidth<=768) closeSidebar(); });
});

// 在 page header 插入漢堡按鈕（手機版才顯示）
const _origGo = window.go;
// 覆寫 go，每次渲染後插入漢堡按鈕
function addHamburger(){
  if(window.innerWidth > 768) return;
  const ph = document.querySelector('.ph');
  if(!ph || ph.querySelector('.hamburger')) return;
  const btn = document.createElement('button');
  btn.className='hamburger';
  btn.setAttribute('aria-label','開啟選單');
  btn.innerHTML='<span></span><span></span><span></span>';
  btn.onclick = openSidebar;
  ph.insertBefore(btn, ph.firstChild);
}

// MutationObserver 監聽 main 內容變化，自動加漢堡
new MutationObserver(()=>addHamburger())
  .observe(document.getElementById('main'), {childList:true, subtree:false});

window.openSidebar=openSidebar;
window.closeSidebar=closeSidebar;
</script>
